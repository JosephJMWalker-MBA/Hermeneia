<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermeneia</title>
<style>
:root {
  --bg:       #0a0a0a;
  --surface:  #111;
  --surface2: #161616;
  --border:   #1e1e1e;
  --border2:  #252525;
  --fg:       #e2e2e2;
  --fg2:      #a8a8a8;
  --dim:      #4a4a4a;
  --dim2:     #666;
  --accent:   #5fcfd4;
  --accent2:  rgba(95,207,212,0.10);
  --green:    #4ec94e;
  --yellow:   #e8b84b;
  --red:      #d45f5f;
  --blue:     #6688cc;
  --sans:     system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono:     'JetBrains Mono', 'Cascadia Code', 'SF Mono', 'Fira Code', monospace;
  --r:        5px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 18px;
  line-height: 1.65;
  min-height: 100vh;
  padding-bottom: 120px;
}

code, .mono {
  font-family: var(--mono);
  font-size: 0.78em;
}

/* ── Expert-mode toggling ──────────────────────────────── */
/* .xo = expert-only  .ho = human-only                     */
.xo { display: none !important; }
body.x .xo { display: revert !important; }
body.x .ho { display: none !important; }

/* ── Layout ───────────────────────────────────────────── */
.wrap { max-width: 860px; margin: 0 auto; padding: 0 28px; }

/* ── Nav ──────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  height: 72px;
  display: flex; align-items: center;
  padding: 0 28px;
  justify-content: space-between;
}
.nav-brand {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  flex-shrink: 0;
}
.nav-right { display: flex; align-items: center; gap: 4px; }

.nav-cycle-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Keep .nav-step / .nav-pipeline available for JS but hidden */
.nav-step { display: none; }
.nav-pipeline { display: none; }
.nav-arrow { display: none; }
.nav-loop-arrow { display: none; }

/* ── Nav mini cycle ── */
.nav-mini-cycle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 5px 14px 5px 6px;
  border-radius: 28px;
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: border-color .2s, background .2s;
  user-select: none;
}
.nav-mini-cycle-wrap:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--bg2) 90%, var(--accent));
}
.nav-mini-cycle-svg {
  display: block;
  flex-shrink: 0;
  /* SVG circles animate via CSS transition */
}
.nav-mini-cycle-svg circle { transition: r .25s cubic-bezier(.34,1.56,.64,1), fill .2s, opacity .2s; }
.nav-mini-stage-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 60px;
}
.nav-mini-stage-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .02em;
  white-space: nowrap;
  transition: color .2s;
}
.nav-mini-stage-sub {
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

/* Onboarding cycle bloom animation */
@keyframes cycle-bloom {
  0%   { opacity: 0; transform: scale(0.1) translateY(-260px); }
  65%  { opacity: 1; transform: scale(1.03) translateY(4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes cycle-shrink {
  0%   { opacity: 1; transform: scale(1) translateY(0); }
  100% { opacity: 0; transform: scale(0.1) translateY(-260px); }
}
.ob-cycle-wrap.blooming {
  animation: cycle-bloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.ob-cycle-wrap.shrinking {
  animation: cycle-shrink 0.32s cubic-bezier(0.4, 0, 1, 1) both;
  pointer-events: none;
}
.nav-btn {
  background: none; border: none;
  color: var(--dim2);
  font-family: var(--sans); font-size: 15px;
  height: 44px; padding: 0 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: color .12s, background .12s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--fg); background: rgba(255,255,255,.04); }

/* Stage navigation bar */
.stage-nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 72px; z-index: 90;
  user-select: none;
}
.stage-nav-arrow {
  display: flex; align-items: center; gap: 10px;
  background: none; border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg2);
  font-family: var(--sans); font-size: 14px; font-weight: 600;
  height: 38px; padding: 0 16px;
  cursor: pointer;
  transition: border-color .12s, color .12s, background .12s;
  white-space: nowrap; min-width: 120px;
}
.stage-nav-arrow:hover { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
.stage-nav-arrow.disabled { opacity: 0.3; pointer-events: none; }
.stage-nav-arrow-icon { font-size: 20px; line-height: 1; }
.stage-nav-center {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.stage-nav-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim2);
}
.stage-nav-name {
  font-size: 15px; font-weight: 700; color: var(--fg);
}

.expert-btn {
  border: 1px solid var(--border2);
  color: var(--dim2);
  font-family: var(--sans); font-size: 13px;
  height: 36px; padding: 0 14px;
  border-radius: var(--r);
  background: none; cursor: pointer;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
}
.expert-btn:hover { color: var(--fg2); border-color: var(--dim); }
body.x .expert-btn { color: var(--accent); border-color: var(--accent); }

/* ── Page header ──────────────────────────────────────── */
.page-head { padding: 52px 0 40px; border-bottom: 1px solid var(--border); }
.page-title { font-size: 30px; font-weight: 600; line-height: 1.15; letter-spacing: -.015em; margin-bottom: 6px; }
.page-file  { font-family: var(--mono); font-size: 11px; color: var(--dim2); letter-spacing: .04em; }

/* ── Section chrome ───────────────────────────────────── */
.section { padding: 44px 0; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }
.sec-label {
  font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--dim2); margin-bottom: 22px;
}

/* ── Coverage ─────────────────────────────────────────── */
.cov-num {
  font-size: 72px; font-weight: 700; line-height: 1;
  letter-spacing: -.035em; color: var(--accent);
  font-variant-numeric: tabular-nums;
  margin-bottom: 12px;
}
.cov-bar {
  height: 2px; background: var(--border2);
  border-radius: 2px; overflow: hidden; margin: 16px 0 12px;
}
.cov-fill {
  height: 100%; background: var(--accent); width: 0;
  transition: width 1.4s cubic-bezier(.4,0,.2,1); border-radius: 2px;
}
.cov-sub { font-size: 16px; color: var(--fg2); cursor: pointer; transition: color .12s; }
.cov-sub:hover { color: var(--accent); }
.cov-items { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
.cov-item {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  border: 1px solid var(--border2); border-radius: var(--r);
  padding: 4px 10px; cursor: pointer; transition: border-color .12s;
}
.cov-item:hover { border-color: var(--accent); }

/* ── Stats ────────────────────────────────────────────── */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 28px 36px; }
.stat-val {
  font-size: 36px; font-weight: 600; line-height: 1;
  letter-spacing: -.02em; margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}
.stat-lbl { font-size: 15px; color: var(--fg2); }
.stat-warn { color: var(--yellow); }
.stat-dim  { color: var(--dim); }

/* ── Search ───────────────────────────────────────────── */
.search-input {
  width: 100%; height: 58px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--fg);
  font-family: var(--sans); font-size: 19px;
  padding: 0 22px; outline: none; -webkit-appearance: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--dim); }
.search-meta { font-size: 14px; color: var(--dim2); margin-top: 10px; min-height: 20px; }

/* ── Results ──────────────────────────────────────────── */
#results { margin-top: 20px; }
.result {
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 22px; margin-bottom: 12px; background: var(--surface);
}
.result-ref { font-family: var(--mono); font-size: 10px; color: var(--dim2); letter-spacing: .06em; margin-bottom: 8px; }
.result-text { font-size: 17px; color: var(--fg2); line-height: 1.65; font-style: italic; margin-bottom: 16px; }
.result-text em { color: var(--yellow); font-style: normal; font-weight: 500; }

.btn-trace {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--fg2);
  font-family: var(--sans); font-size: 14px;
  padding: 0 20px; height: 44px; cursor: pointer;
  transition: border-color .12s, color .12s;
}
.btn-trace:hover    { border-color: var(--accent); color: var(--accent); }
.btn-trace.active   { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
.btn-trace:disabled { opacity: .4; cursor: not-allowed; }

/* ── Trace ────────────────────────────────────────────── */
#trace { padding-top: 44px; }

@keyframes layer-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes check-pop {
  from { opacity: 0; transform: scale(.5); }
  to   { opacity: 1; transform: scale(1); }
}

.trace-layer { animation: layer-in .35s cubic-bezier(.4,0,.2,1) both; }
.trace-arrow { text-align: center; color: var(--dim); font-size: 18px; padding: 6px 0; animation: layer-in .2s ease both; }

/* Canonical lineage */
.lineage-panel {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); overflow: hidden;
}
.lineage-head {
  display: flex; align-items: center; justify-content: space-between; gap: 18px;
  padding: 18px 22px; border-bottom: 1px solid var(--border);
}
.lineage-title { font-size: 17px; font-weight: 600; color: var(--fg); }
.lineage-sub { font-size: 13px; color: var(--dim2); margin-top: 2px; }
.lineage-vocab {
  border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--dim2); background: none; height: 34px; padding: 0 12px;
  font-size: 13px; cursor: pointer;
}
.lineage-body { padding: 22px; }
.lineage-class + .lineage-class { margin-top: 18px; }
.lineage-class-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .12em; color: var(--dim2); margin-bottom: 10px;
}
.lineage-node {
  width: 100%; text-align: left; display: flex; gap: 14px; align-items: flex-start;
  background: var(--surface2); color: var(--fg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px; cursor: pointer;
}
.lineage-node + .lineage-node { margin-top: 8px; }
.lineage-node:hover, .lineage-node.open { border-color: var(--accent); }
.lineage-icon { font-size: 22px; line-height: 1; width: 26px; text-align: center; flex-shrink: 0; }
.lineage-node-title { font-size: 16px; font-weight: 600; color: var(--fg); line-height: 1.25; }
.lineage-node-sub { font-size: 13px; color: var(--dim2); margin-top: 2px; }
.lineage-node-id { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 7px; }
.lineage-detail {
  display: none; margin: 8px 0 0 40px; border-left: 1px solid var(--border);
  padding: 8px 0 4px 14px;
}
.lineage-detail.open { display: block; }
.lineage-kv { display: grid; grid-template-columns: 130px 1fr; gap: 10px; padding: 4px 0; font-size: 13px; }
.lineage-k { color: var(--dim2); font-family: var(--mono); font-size: 11px; }
.lineage-v { color: var(--fg2); overflow-wrap: anywhere; }
.lineage-flow { text-align: center; color: var(--dim); padding: 8px 0; }
.lineage-link {
  border: none; background: none; color: var(--accent);
  font: inherit; padding: 0; margin-top: 14px; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
}

/* Trust summary */
.trust-card {
  margin-top: 18px; border: 1px solid var(--border2);
  border-radius: var(--r); background: var(--surface2); overflow: hidden;
}
.trust-head {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 15px; border-bottom: 1px solid var(--border);
}
.trust-icon { font-size: 18px; line-height: 1; }
.trust-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.trust-body { padding: 8px 15px 13px; }
.trust-row {
  display: flex; justify-content: space-between; gap: 16px;
  padding: 6px 0; font-size: 14px; color: var(--fg2);
}
.trust-mark { flex-shrink: 0; font-weight: 600; }
.trust-pass { color: var(--green); }
.trust-fail { color: var(--red); }
.trust-pending { color: var(--yellow); }
.trust-loading, .trust-error {
  margin-top: 18px; border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 15px;
  color: var(--dim2); font-size: 14px;
}
.trust-error { color: var(--red); }
.trust-why {
  border: none; background: none; color: var(--dim2);
  font: inherit; font-size: 13px; padding: 0; margin-top: 10px;
  cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
}
.trust-why:hover { color: var(--fg2); }
.trust-explain {
  display: none; margin-top: 10px; padding: 12px 14px;
  border-left: 2px solid var(--accent); color: var(--fg2);
  font-size: 13px; line-height: 1.55;
}
.trust-explain.open { display: block; }
.trust-explain ul { margin: 7px 0 8px 18px; }
.trust-explain-note { color: var(--accent); }

.contract-card {
  margin-top: 18px; border: 1px solid var(--border2);
  border-radius: var(--r); background: var(--surface2); padding: 15px;
}
.contract-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.contract-count { color: var(--dim2); font-size: 13px; margin-top: 1px; }
.contract-summary {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 12px;
}
.contract-stat {
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 8px 9px; font-size: 12px; color: var(--dim2);
}
.contract-stat strong { display: block; font-size: 17px; line-height: 1.15; }
.contract-stat-ok strong { color: var(--green); }
.contract-stat-bad strong { color: var(--red); }
.contract-stat-pending strong { color: var(--yellow); }
.contract-link {
  display: inline-block; margin-top: 12px; color: var(--accent);
  font-size: 14px; text-decoration: underline; text-underline-offset: 3px;
}

/* Layer cards */
.lcard {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); overflow: hidden;
}
.lcard-hi   { border-color: var(--accent); }
.lcard-warn { border-color: var(--yellow); }

.lhead {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 22px; border-bottom: 1px solid var(--border);
}
.lhead-emoji { font-size: 24px; line-height: 1; flex-shrink: 0; }
.lhead-info  { flex: 1; min-width: 0; }
.lhead-title { font-size: 17px; font-weight: 600; color: var(--fg); line-height: 1.25; }
.lhead-sub   { font-size: 13px; color: var(--dim2); margin-top: 1px; line-height: 1.3; }
.lhead-badge { font-size: 13px; font-weight: 500; flex-shrink: 0; }
.badge-done    { color: var(--green); }
.badge-warn    { color: var(--yellow); }
.badge-pending { color: var(--dim2); }

.lbody { padding: 22px; }

/* Observation */
.obs-quote { font-size: 18px; font-style: italic; color: var(--fg); line-height: 1.7; margin-bottom: 10px; }
.obs-meta  { font-family: var(--mono); font-size: 11px; color: var(--dim2); }
.obs-page  { font-size: 14px; color: var(--dim2); }

/* Interpretations */
.interp + .interp { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
.interp-lens { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.chip {
  display: inline-block; font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .08em;
  border: 1px solid var(--dim); color: var(--dim2);
  padding: 1px 7px; border-radius: 3px; vertical-align: middle;
}
.chip-established { border-color: var(--green);  color: var(--green); }
.chip-speculative { border-color: var(--blue);   color: var(--blue); }
.chip-contested   { border-color: var(--yellow); color: var(--yellow); }
.interp-text { font-size: 16px; font-style: italic; color: var(--fg2); line-height: 1.65; margin-top: 6px; }

/* Perspectives */
.persp-row { display: flex; gap: 16px; padding: 8px 0; border-top: 1px solid var(--border); align-items: baseline; }
.persp-row:first-child { border-top: none; }
.persp-name { font-size: 15px; font-weight: 500; color: var(--accent); min-width: 130px; flex-shrink: 0; }
.persp-desc { font-size: 14px; color: var(--dim2); }

/* Blueprint / Architect */
.bp-title  { font-size: 19px; font-weight: 600; color: var(--fg); margin-bottom: 8px; }
.bp-thesis { font-size: 16px; font-style: italic; color: var(--fg2); line-height: 1.65; margin-bottom: 10px; }
.bp-meta   { font-family: var(--mono); font-size: 11px; color: var(--dim2); }

/* Artist */
.render-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 16px; margin-bottom: 10px;
}
.render-name { font-size: 15px; font-weight: 500; color: var(--fg); flex: 1; }
.render-lang { font-family: var(--mono); font-size: 11px; color: var(--dim2); }
.render-prov { font-family: var(--mono); font-size: 11px; color: var(--dim); }

.profile-list { margin-top: 18px; }
.profile-list-hd {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: .12em; color: var(--dim2); margin-bottom: 10px;
}
.profile-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-top: 1px solid var(--border); gap: 12px;
}
.profile-row-name  { font-size: 15px; color: var(--fg2); }
.profile-row.done .profile-row-name { color: var(--fg); }
.profile-done { font-size: 13px; color: var(--green); }
.profile-cmd  { font-family: var(--mono); font-size: 11px; color: var(--dim); }

/* Critic */
.critic-score {
  font-size: 52px; font-weight: 700; letter-spacing: -.025em; line-height: 1;
  margin-bottom: 8px; font-variant-numeric: tabular-nums;
}
.critic-status { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.critic-missing { font-size: 14px; color: var(--red); margin-top: 6px; }
.critic-warn    { font-size: 14px; color: var(--yellow); margin-top: 4px; }
.audit-link {
  display: inline-block; margin-top: 16px;
  font-size: 15px; color: var(--accent);
  text-decoration: underline; text-underline-offset: 3px; cursor: pointer;
}
.audit-link:hover { opacity: .8; }

/* Essay / Authorship */
.auth-status { font-size: 20px; margin-bottom: 12px; }
.auth-reason { font-size: 16px; color: var(--fg2); line-height: 1.65; margin-bottom: 22px; }
.pipe-cols { display: flex; gap: 28px; }
.pipe-col  { flex: 1; }
.pipe-col-hd {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--accent); margin-bottom: 10px;
}
.pipe-col-hd.dim { color: var(--dim2); }
.pipe-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-top: 1px solid var(--border); font-size: 15px;
}
.pipe-name.done    { color: var(--fg); }
.pipe-name.pending { color: var(--dim2); }
.pipe-name.warn    { color: var(--yellow); }
.pipe-check.done    { color: var(--accent); animation: check-pop .25s cubic-bezier(.34,1.56,.64,1) both; }
.pipe-check.warn    { color: var(--yellow); }
.pipe-check.pending { color: var(--dim); }
.pipe-div { width: 1px; background: var(--border); }

/* ── Expression Matrix ────────────────────────────────── */
.matrix-head {
  display: flex; align-items: center; justify-content: space-between;
}
.matrix-toggle {
  background: none; border: none;
  color: var(--accent); font-family: var(--sans); font-size: 14px;
  cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  padding: 0;
}
.matrix-scroll { overflow-x: auto; margin-top: 20px; }
.matrix-tbl { border-collapse: collapse; width: 100%; min-width: 480px; }
.matrix-tbl th {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: .08em; color: var(--dim2);
  padding: 0 8px 14px 8px; text-align: center;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.matrix-tbl th.bp-th { text-align: left; padding-left: 0; min-width: 180px; }
.matrix-tbl td {
  padding: 8px; border-bottom: 1px solid var(--border);
  text-align: center; vertical-align: middle;
}
.matrix-tbl td.bp-td {
  text-align: left; padding-left: 0; font-size: 15px; color: var(--fg2);
  max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.matrix-tbl tr:hover td { background: rgba(255,255,255,.015); }

.mcell {
  width: 44px; height: 44px;
  background: none; border: none; border-radius: var(--r);
  font-size: 18px; cursor: pointer; display: inline-flex;
  align-items: center; justify-content: center; transition: background .1s;
}
.mcell:hover  { background: rgba(255,255,255,.06); }
.mcell.active { background: var(--accent2); outline: 1px solid rgba(95,207,212,.3); }
.mcell-ok     { color: var(--green); }
.mcell-warn   { color: var(--yellow); }
.mcell-empty  { color: var(--dim); }
.mcell-count  {
  color: var(--accent); border: 1px solid rgba(95,207,212,.28);
  font-family: var(--mono); font-size: 13px;
}
.mcell-lang   { display: block; font-size: 9px; color: var(--dim); letter-spacing: .06em; margin-top: 1px; font-family: var(--mono); }

.mdetail {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 22px; margin-top: 12px;
  animation: layer-in .2s ease both;
}
.mdetail-title { font-size: 17px; font-weight: 600; color: var(--fg); margin-bottom: 16px; }
.mdetail-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 7px 0; border-top: 1px solid var(--border); font-size: 15px;
}
.mdetail-row:first-of-type { border-top: none; }
.mdetail-label { color: var(--dim2); }
.mdetail-cmd {
  margin-top: 14px; background: rgba(255,255,255,.03);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--dim2);
}
.matrix-legend {
  display: flex; gap: 20px; margin-top: 14px;
  font-size: 13px; color: var(--dim2); flex-wrap: wrap;
}
.provider-matrix-head {
  display: flex; justify-content: space-between; gap: 18px;
  align-items: flex-end; margin-bottom: 14px;
}
.provider-matrix-sub { color: var(--dim2); font-size: 13px; margin-top: 2px; }
.provider-render {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface2); padding: 15px; margin-top: 9px;
}
.provider-render-head {
  display: flex; justify-content: space-between; gap: 16px;
  align-items: flex-start;
}
.provider-name { font-size: 15px; font-weight: 600; color: var(--fg); }
.provider-model { color: var(--dim2); font-family: var(--mono); font-size: 11px; margin-top: 2px; }
.provider-registration { color: var(--dim); font-family: var(--mono); font-size: 10px; margin-top: 4px; }
.provider-result { text-align: right; flex-shrink: 0; }
.provider-score { font-size: 18px; font-weight: 700; line-height: 1.2; }
.provider-verdict { font-size: 12px; margin-top: 2px; }
.provider-actions {
  display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.provider-action {
  border: none; background: none; color: var(--accent); padding: 0;
  font: inherit; font-size: 13px; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
}
.provider-action.disabled { color: var(--dim); text-decoration: none; cursor: default; }
.provider-trust-host .trust-card { margin-top: 12px; }

/* E10 vertical slice */
.e10-toolbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.e10-screen { display: none; }
.e10-screen.active { display: block; }
.app-error {
  display: none; margin-top: 18px; border: 1px solid var(--red);
  border-radius: var(--r); background: rgba(212,95,95,.08);
  color: var(--red); padding: 12px 14px; font-size: 14px;
}
.app-error.open { display: block; }
.e10-select {
  height: 40px; background: var(--surface); color: var(--fg);
  border: 1px solid var(--border2); border-radius: var(--r); padding: 0 12px;
}
.screen-explainer {
  margin-top: 48px;
  border-top: 1px solid var(--border);
  padding-top: 24px;
  color: var(--dim2);
  font-size: 13px;
  line-height: 1.7;
}
.screen-explainer-title {
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim2);
  font-weight: 600;
  margin-bottom: 12px;
}
.screen-explainer p { margin: 0 0 10px; }
.screen-explainer strong { color: var(--fg2); }
.screen-explainer em { color: var(--fg2); font-style: italic; }

.e10-empty {
  border: 1px dashed var(--border2); border-radius: var(--r);
  color: var(--dim2); padding: 18px; background: var(--surface);
}
.e10-stack { display: grid; gap: 12px; margin-top: 16px; }
.e10-observation, .e10-card {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 18px;
}
.e10-observation { cursor: pointer; position: relative; }
.e10-observation:hover, .e10-observation.active { border-color: var(--accent); }
.e10-observation.bookmarked { border-color: #b45309; }
.obs-bookmark-btn {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; cursor: pointer; font-size: 14px;
  opacity: 0.35; transition: opacity .15s; padding: 2px 4px; line-height: 1;
}
.obs-bookmark-btn:hover, .e10-observation.bookmarked .obs-bookmark-btn { opacity: 1; }
.e10-meta {
  font-family: var(--mono); font-size: 10px; color: var(--dim2);
  letter-spacing: .06em; margin-bottom: 8px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.obs-provenance {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; letter-spacing: .04em;
  white-space: nowrap;
}
.obs-provenance.role-primary     { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.obs-provenance.role-reference   { background: color-mix(in srgb, #a855f7 14%, transparent); color: #a855f7; }
.obs-provenance.role-notes       { background: color-mix(in srgb, #64748b 16%, transparent); color: #94a3b8; }
.obs-provenance.role-commentary  { background: color-mix(in srgb, #f59e0b 14%, transparent); color: #f59e0b; }
.obs-provenance.role-exploratory { background: color-mix(in srgb, #22d3ee 14%, transparent); color: #22d3ee; }
/* Profile pill labels */
.profile-pill-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--fg2); cursor: pointer;
  padding: 5px 8px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  transition: border-color .12s;
  white-space: nowrap;
}
.profile-pill-label:hover { border-color: var(--accent); color: var(--fg); }
.profile-pill-label:has(.action-profile-cb:checked) {
  border-color: var(--accent);
  background: var(--accent2);
  color: var(--accent);
}
.profile-pill-text { display: flex; flex-direction: column; gap: 1px; }
.profile-pill-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
.profile-pill-meta { font-size: 10px; color: var(--dim2); line-height: 1.2; }
.profile-pill-label:has(.action-profile-cb:checked) .profile-pill-meta { color: color-mix(in srgb, var(--accent) 70%, transparent); }
/* Profile preview panel */
.profile-preview-panel {
  margin-top: 10px; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 6px; font-size: 12px; color: var(--fg2); line-height: 1.55;
  display: none;
}
.profile-preview-panel.visible { display: block; }
.profile-preview-name { font-weight: 700; color: var(--fg); margin-bottom: 3px; font-size: 13px; }
.profile-preview-meta { font-size: 10px; color: var(--dim2); margin-bottom: 6px; }

/* Scope banner */
.corpus-scope-banner {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 12px; margin-bottom: 12px;
  border: 1px solid var(--border2); border-radius: var(--r);
  background: var(--surface2); font-size: 12px; color: var(--dim2);
}
.corpus-scope-banner-label { font-weight: 600; color: var(--fg2); margin-right: 4px; }
.scope-doc-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 12px; font-size: 11px; font-family: var(--mono);
}
.scope-doc-chip.role-primary     { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.scope-doc-chip.role-reference   { background: color-mix(in srgb, #a855f7 14%, transparent); color: #a855f7; }
.scope-doc-chip.role-notes       { background: color-mix(in srgb, #64748b 16%, transparent); color: #94a3b8; }
.scope-doc-chip.role-commentary  { background: color-mix(in srgb, #f59e0b 14%, transparent); color: #f59e0b; }
.scope-doc-chip.role-exploratory { background: color-mix(in srgb, #22d3ee 14%, transparent); color: #22d3ee; }
.e10-text { color: var(--fg2); font-size: 16px; line-height: 1.6; overflow-wrap: anywhere; }
.e10-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.e10-badge {
  font-family: var(--mono); font-size: 10px; color: var(--fg2);
  border: 1px solid var(--border2); border-radius: var(--r); padding: 3px 7px;
}
.e10-participants {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px; margin: 16px 0;
}
.e10-check {
  border: 1px solid var(--border2); border-radius: var(--r);
  background: var(--surface); padding: 10px 12px; color: var(--fg2);
  font-size: 14px;
}
.e10-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.e10-comment {
  width: 100%; min-height: 70px; resize: vertical; margin-top: 12px;
  background: var(--surface2); color: var(--fg); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 10px; font: inherit; font-size: 14px;
}
.e10-policy-grid { display: grid; gap: 12px; margin-top: 12px; }
.e10-claim { border-left: 2px solid var(--accent); padding-left: 10px; margin-top: 10px; }
.e10-lineage { display: grid; gap: 8px; margin-top: 12px; }
.e10-lineage-row {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface2); padding: 12px 14px;
}
.e10-lineage-arrow { color: var(--dim); text-align: center; }
.provider-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.provider-card {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 16px;
}
.provider-card.connected { border-color: rgba(78,201,78,.45); }
.provider-card.configured { border-color: rgba(78,201,78,.45); }
.provider-card.not_connected { border-color: rgba(212,95,95,.45); }
.provider-card.not_wired { border-color: var(--border2); opacity: .85; }
.provider-card.key_saved { border-color: rgba(214,168,67,.55); }
.provider-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.provider-name { font-size: 16px; font-weight: 600; }
.provider-status {
  font-family: var(--mono); font-size: 10px; border: 1px solid var(--border2);
  border-radius: var(--r); padding: 3px 7px; color: var(--fg2);
}
.provider-status.connected { color: var(--green); border-color: rgba(78,201,78,.5); }
.provider-status.configured { color: var(--green); border-color: rgba(78,201,78,.5); }
.provider-status.not_connected { color: var(--red); border-color: rgba(212,95,95,.5); }
.provider-status.key_saved { color: #d6a843; border-color: rgba(214,168,67,.6); }
.provider-kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px; margin-top: 12px; font-size: 13px; }
.provider-k { color: var(--dim2); font-family: var(--mono); font-size: 11px; }
.provider-v { color: var(--fg2); overflow-wrap: anywhere; }
.provider-note { margin-top: 14px; color: var(--dim2); font-size: 14px; }
.provider-key-panel {
  margin-top: 12px; border: 1px solid var(--border2); border-radius: var(--r);
  background: var(--surface2); padding: 14px;
}
.provider-key-title { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 8px; }
.provider-command {
  margin-top: 10px; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: var(--r); background: var(--bg); color: var(--fg2);
  font-family: var(--mono); font-size: 12px; overflow-wrap: anywhere;
}
.provider-key-input {
  width: 100%; height: 42px; margin-top: 10px; background: var(--bg);
  color: var(--fg); border: 1px solid var(--border2); border-radius: var(--r);
  padding: 0 12px; font: inherit; font-size: 14px;
}
.reader-list {
  display: grid; gap: 12px;
}
.reader-card {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 18px; cursor: pointer;
}
.reader-card:hover, .reader-card.active { border-color: var(--accent); }
.reader-title { font-size: 16px; font-weight: 650; color: var(--fg); }
.reader-meta {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
  color: var(--dim2); font-family: var(--mono); font-size: 10px;
}
.reader-layout {
  display: grid; grid-template-columns: minmax(0, 1fr) 230px;
  gap: 24px; align-items: start;
}
.reader-report {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 28px;
}
.reader-report-text {
  white-space: pre-wrap; color: var(--fg); font-size: 18px;
  line-height: 1.78; overflow-wrap: anywhere;
}
.reader-side {
  position: sticky; top: 72px; border: 1px solid var(--border);
  border-radius: var(--r); background: var(--surface); padding: 16px;
}
.reader-side-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--dim2); margin-bottom: 10px;
}
.reader-action {
  width: 100%; min-height: 38px; margin-top: 8px;
  background: none; color: var(--fg2); border: 1px solid var(--border2);
  border-radius: var(--r); cursor: pointer; font: inherit; font-size: 13px;
}
.reader-action:hover { color: var(--accent); border-color: var(--accent); }
/* ── Investigation Setup ─────────────────────────────── */
.setup-wrap { max-width: 640px; }
.setup-preamble { font-size: 14px; color: var(--fg2); line-height: 1.75; margin-bottom: 28px; padding: 18px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); }
.setup-preamble strong { color: var(--fg); }
.setup-field { margin-bottom: 22px; }
.setup-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim2); font-weight: 600; margin-bottom: 6px; }
.setup-prompt { font-size: 15px; color: var(--fg); margin-bottom: 8px; font-weight: 600; }
.setup-example { font-size: 12px; color: var(--dim2); font-style: italic; margin-bottom: 8px; line-height: 1.5; }
.setup-textarea { width: 100%; box-sizing: border-box; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); color: var(--fg); font-size: 14px; font-family: var(--sans); line-height: 1.6; padding: 10px 12px; resize: vertical; min-height: 72px; }
.setup-textarea:focus { outline: none; border-color: var(--accent); }
.setup-tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.setup-tag { display: flex; align-items: center; gap: 5px; background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); color: var(--accent); border-radius: 20px; padding: 3px 10px; font-size: 12px; }
.setup-tag button { background: none; border: none; color: var(--accent); cursor: pointer; padding: 0; font-size: 13px; line-height: 1; opacity: .7; }
.setup-tag-input { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--fg); font-size: 12px; padding: 4px 12px; font-family: var(--sans); }
.setup-tag-input:focus { outline: none; border-color: var(--accent); }
.setup-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
/* ── Investigation card on dashboard ─────────────────── */
.inv-card { border: 1px solid var(--accent); border-radius: var(--r); padding: 18px 20px; margin-bottom: 24px; background: color-mix(in srgb, var(--accent) 5%, transparent); }
.inv-card-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
.inv-card-title { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
.inv-triad { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 500px) { .inv-triad { grid-template-columns: 1fr; } }
.inv-triad-full { grid-column: 1 / -1; }
.inv-block-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim2); margin-bottom: 4px; }
.inv-block-text { font-size: 13px; color: var(--fg); line-height: 1.5; }
.inv-lens-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.inv-lens-chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: color-mix(in srgb, var(--fg2) 12%, transparent); color: var(--fg2); }
.onboarding-panel {
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); padding: 24px;
}
.onboarding-title {
  font-size: 24px; line-height: 1.2; color: var(--fg);
  font-weight: 700; letter-spacing: 0; margin-bottom: 8px;
}
.onboarding-goal { color: var(--fg2); font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
.onboarding-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
.onboarding-step {
  text-align: left; border: 1px solid var(--border2); border-radius: var(--r);
  background: var(--surface2); color: var(--fg); padding: 14px;
  cursor: pointer; font: inherit; min-height: 96px; position: relative;
}
.onboarding-step:hover { border-color: var(--accent); }
.onboarding-step.status-complete { border-color: #2d6a4f; background: color-mix(in srgb, var(--surface2) 92%, #2d6a4f); }
.onboarding-step.status-current  { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent); }
.onboarding-step.status-pending  { opacity: 0.55; }
.onboarding-step-num { color: var(--accent); font-family: var(--mono); font-size: 11px; }
.onboarding-step-label { font-size: 16px; font-weight: 650; margin-top: 4px; }
.onboarding-step-count { color: var(--dim2); font-family: var(--mono); font-size: 11px; margin-top: 8px; }
.onboarding-step-desc { color: var(--dim2); font-size: 12px; line-height: 1.4; margin-top: 6px; }
.onboarding-status-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 11px; font-family: var(--mono); padding: 2px 7px;
  border-radius: 10px; font-weight: 600;
}
.onboarding-status-badge.complete { background: #2d6a4f; color: #b7e4c7; }
.onboarding-status-badge.current  { background: var(--accent); color: #fff; }
.onboarding-current-cta {
  margin-top: 20px; padding: 16px 20px;
  border: 1px solid var(--accent); border-radius: var(--r);
  background: color-mix(in srgb, var(--surface) 90%, var(--accent));
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.onboarding-current-cta-label { font-size: 13px; color: var(--dim2); margin-bottom: 2px; }
.onboarding-current-cta-text  { font-size: 15px; font-weight: 650; color: var(--fg); }

/* Cycle diagram */
.ob-cycle-wrap { position: relative; width: 440px; height: 440px; margin: 24px auto 16px; }
.ob-cycle-svg  { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.ob-cycle-node {
  position: absolute; width: 84px; height: 64px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  border: 1.5px solid var(--border2); border-radius: 10px; background: var(--surface2);
  cursor: pointer; font: inherit; color: var(--fg); transition: border-color .15s, box-shadow .15s;
  text-align: center;
}
.ob-cycle-node:hover { border-color: var(--accent); }
.ob-cycle-node.status-complete { border-color: #2d6a4f; background: color-mix(in srgb, var(--surface2) 88%, #2d6a4f); }
.ob-cycle-node.status-current  { border-color: var(--accent); box-shadow: 0 0 0 2.5px color-mix(in srgb, var(--accent) 22%, transparent); }
.ob-cycle-node.status-pending  { opacity: 0.52; }
.ob-cycle-node-label { font-size: 13px; font-weight: 700; line-height: 1.1; }
.ob-cycle-node-count { font-size: 11px; font-family: var(--mono); color: var(--dim2); }
.ob-cycle-node-status { font-size: 10px; color: var(--accent); font-weight: 600; }
.ob-cycle-node.status-complete .ob-cycle-node-status { color: #4a9e6e; }

/* Guide screen */
.guide-pipeline { display: flex; flex-direction: column; gap: 0; }
.guide-stage {
  display: flex; gap: 0; cursor: pointer;
}
.guide-stage:hover .guide-stage-body { border-color: var(--accent); }
.guide-stage-left {

.ob-extract-toggle {

.ob-recent-docs {

.ob-recent-meta { font-size: 11px; color: var(--dim2); font-family: var(--mono); white-space: nowrap; }

/* Generated Understanding card */
.ob-understanding {
  border: 1px solid var(--accent); border-radius: var(--r);
  background: color-mix(in srgb, var(--surface) 94%, var(--accent));

}

  display: flex; justify-content: space-between; align-items: flex-start;

}

  font-size: 18px; font-weight: 700; color: var(--fg); line-height: 1.25;
}

  font-size: 13px; color: var(--fg2); line-height: 1.6; margin-bottom: 12px;

.ob-report-pills-label {
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--dim2); margin-bottom: 6px;
}
.ob-report-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.ob-report-pill {
  font-size: 12px; padding: 4px 12px; border-radius: 14px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--fg); cursor: pointer; font: inherit;
}
.ob-report-pill:hover { border-color: var(--accent); color: var(--accent); }
.ob-understanding-actions { display: flex; gap: 8px; }

/* Layer 1 — identity */
.ob-identity {
  border-bottom: 1px solid var(--border2); padding-bottom: 22px; margin-bottom: 22px;
}
.ob-identity-tag {
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim2); margin-bottom: 8px;
}
.ob-identity-statement {
  font-size: 22px; font-weight: 700; color: var(--fg); line-height: 1.2; margin-bottom: 8px;
}
.ob-identity-sub {
  font-size: 14px; color: var(--fg2); line-height: 1.6; max-width: 680px;
}

/* Layer 2 — principles */
.ob-section-label {
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim2); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;

.ob-progress-pill {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 2px 9px; font-size: 11px;
  color: var(--fg2); text-transform: none; letter-spacing: 0; font-weight: 500;

  background: var(--surface2); padding: 14px 16px;

  font-size: 13px; font-weight: 650; color: var(--fg); margin-bottom: 6px;
}

  font-size: 12px; color: var(--fg2); line-height: 1.55;

<script>
// ── State ──────────────────────────────────────────────
let _dbt = null, _activeBtn = null, _layers = [], _profiles = [], _lineageGraph = null;
let _expert = false, _matrixOpen = false, _matrixData = null;
let _activeCell = null, _covOpen = false;
let _e10Selected = null, _e10Detail = null, _e10ActiveProposal = null;
let _e10Providers = null;
let _e10ProviderNotices = {};

// ── Boot ───────────────────────────────────────────────
(async () => {
  try {
    mount(await get('/api/health'));
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div style="color:var(--red);padding:80px 0">${e.message}</div>`;
  }
})();

// ── Expert mode ────────────────────────────────────────
function toggleExpert() {
  _expert = !_expert;
  document.body.classList.toggle('x', _expert);
  if (_expert) {
    document.querySelectorAll('.e10-screen').forEach(screen => screen.classList.remove('active'));
    e10LoadProviders();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    e10Go('corpus');
  }
  if (_lineageGraph) redrawLineage(false);
  else if (_layers.length) redrawTrace();
}

// ── Mount ──────────────────────────────────────────────
function mount(h) {
  const fn    = h.document?.filename || '';
  const title = fn.replace(/\.pdf$/i,'').replace(/[_-]/g,' ')
                  .replace(/\b\w/g, c => c.toUpperCase()) || 'Hermeneia';

  document.getElementById('root').innerHTML = `
<header class="page-head">
  <div class="page-title">E10 Vertical Slice</div>
  ${fn ? `<div class="page-file">${x(fn)}</div>` : ''}
  <div id="app-error" class="app-error"></div>
</header>

<section class="section xo" id="provider-settings">
  <div class="sec-label">Expert — Providers</div>
  <div id="provider-panel" class="e10-empty">Loading provider status...</div>
</section>

<section class="section e10-screen" id="setup">
  <div class="sec-label">Investigation Setup</div>
  <div id="setup-panel"></div>
</section>

<section class="section e10-screen" id="onboarding">
  <div class="sec-label">Start Here</div>
  <div id="onboarding-panel">
    <div class="e10-empty">Loading project path...</div>
  </div>
</section>

<section class="section e10-screen" id="corpus">
  <div class="sec-label">Screen 1 — Corpus Explorer</div>
  <div id="corpus-document-scope"></div>
  <div id="research-question-banner"></div>
  <div class="e10-toolbar">
    <select id="obs-filter" class="e10-select" onchange="e10LoadObservations()">
      <option value="all">All</option>
      <option value="bookmarked">Bookmarked</option>
      <option value="uninterpreted">Uninterpreted</option>
      <option value="interpreted">Interpreted</option>
      <option value="pending">Pending Review</option>
      <option value="critic">Critic Reports</option>
    </select>
  </div>
  <input id="q" class="search-input" type="text"
    placeholder="Search observations…" autocomplete="off" spellcheck="false">
  <div class="search-meta" id="qmeta"></div>
  <div id="motif-panel"></div>
  <div id="results"></div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is the Corpus?</div>
    <p>The Corpus is the evidence base — every sentence and passage extracted from your document, preserved exactly as written. These are called <strong>observations</strong>. They are immutable: the machine never rewrites them, summarizes them, or loses them.</p>
    <p>Use the search box to find passages by keyword. When a search returns multiple results, a <strong>Pattern View</strong> appears at the top — showing all occurrences simultaneously with a distribution timeline. This is how recurring concepts (symbols, phrases, contested terms) become visible across the full document.</p>
    <p><strong>How to use it:</strong> Search for a term you want to investigate. Review the Pattern View if multiple passages appear. Click any observation to select it, then go to the Lab to generate an interpretation.</p>
    <div style="margin-top:16px"><button class="btn-primary" onclick="e10Go('lab')" style="padding:8px 20px">Next: Interpretation Lab →</button></div>
  </div>
</section>

<section class="section e10-screen" id="lab">
  <div class="sec-label">Screen 2 — Interpretation Lab</div>
  <div id="lab-scope-banner"></div>
  <div id="selected-observation" class="e10-empty">Select an observation from the corpus.</div>
  <div id="lab-participants-host"></div>
  <button class="btn-trace" onclick="e10GenerateInterpretations()">Generate Interpretations</button>
  <div id="lab-results" class="e10-stack"></div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is the Interpretation Lab?</div>
    <p>This is where AI providers propose what each observation <em>means</em>. Select an observation from the Corpus, choose one or more providers, and click Generate. Each provider produces a proposal — a candidate interpretation anchored to the observed text.</p>
    <p>Proposals are not canonical. They are drafts. Nothing enters the permanent record here. The next step — Steward Review — is where a human decides which proposals to accept.</p>
    <p><strong>How to use it:</strong> Select an observation from the Corpus tab. The observation text appears above. Check the providers you want to hear from. Click Generate. Review the proposals on the next screen.</p>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="e10Go('corpus')" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer">← Corpus</button>
      <button class="btn-primary" onclick="e10Go('review')" style="padding:8px 20px">Next: Steward Review →</button>
    </div>
  </div>
</section>

<section class="section e10-screen" id="review">
  <div class="sec-label">Screen 3 — Steward Review</div>
  <div id="review-canon-panel"></div>
  <div id="review-panel" class="e10-empty" style="display:none">Generated proposals will appear here.</div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is Steward Review?</div>
    <p>This is where human judgment enters the record. AI proposals from the Lab arrive here as candidates. You read each one, decide whether it accurately represents what the text says, and choose to <strong>Establish</strong> (accept as canonical), <strong>Contest</strong> (mark as questionable), or <strong>Mark Uncertain</strong> (flag for further review).</p>
    <p>Nothing becomes canonical without your decision. Every status change is logged with a timestamp and your note — so the record shows not just what was decided, but when and why it changed.</p>
    <p>The <strong>Pipeline Actions</strong> bar at the top lets you run the Artist (generate the full report) and Critic (audit the report) once interpretations are in place. Select providers and profiles, then run.</p>
    <p><strong>How to use it:</strong> Review each interpretation card. Add a steward note explaining your reasoning. Click Establish to accept, or Contest/Mark Uncertain to flag concerns. When you're ready to generate the report, use Pipeline Actions above.</p>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="e10Go('lab')" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer">← Lab</button>
      <button class="btn-primary" onclick="e10Go('architect')" style="padding:8px 20px">Next: Architect →</button>
    </div>
  </div>
</section>

<section class="section e10-screen" id="reader">
  <div class="sec-label">Reader View</div>
  <div id="reader-panel">
    <div class="e10-empty">Loading rendered narratives…</div>
  </div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is the Reader View?</div>
    <p>These are the rendered reports — the final output of the pipeline. Each card represents one narrative generated by an AI provider using a specific expression profile (literary, executive, children's, Spanish, etc.) from the same underlying evidence base.</p>
    <p>The same evidence, expressed differently. The thesis and meaning are fixed by the Architect Plan. The voice, register, and language adapt to the profile. A 74% fidelity score means 74% of the required concepts made it into the prose.</p>
    <p><strong>How to use it:</strong> Click any card to read the full report. Compare versions rendered in different profiles to see how the same understanding translates across audiences. Use Run Critic (from the Review tab) to audit any report's fidelity.</p>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="e10Go('review')" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer">← Review</button>
      <button class="btn-primary" onclick="e10Go('critic')" style="padding:8px 20px">Next: Critic →</button>
    </div>
  </div>
</section>

<section class="section e10-screen" id="critic">
  <div class="sec-label">Screen 4 — Critic</div>
  <div id="critic-explorer-root">
    <div id="critic-picker-panel"></div>
    <div id="critic-detail-panel" style="display:none"></div>
  </div>
  <div id="critic-panel" class="e10-empty" style="display:none">Select a proposed interpretation to run the Critic.</div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is the Critic?</div>
    <p>The Critic is an automated auditor. After the Artist renders a report, the Critic checks whether the report faithfully preserved the evidence it was built from. It runs deterministic evaluation functions — not another AI opinion, but structured checks against the Architect Plan.</p>
    <p>The <strong>semantic fidelity score</strong> measures what percentage of required concepts survived into the final prose. A score below 100% means some evidence was lost in translation. The Critic identifies exactly what was dropped, what was unsupported, and what warnings apply.</p>
    <p><strong>How to use it:</strong> After running the Artist, return here to run the Critic. Select a report, click Run Critic from the Review tab, then come back here to review the findings.</p>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="e10Go('reader')" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer">← Read</button>
      <button onclick="e10Go('lineage')" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer">Lineage →</button>
    </div>
  </div>
</section>

<section class="section e10-screen" id="lineage">
  <div class="sec-label">Screen 5 — Lineage Explorer</div>
  <div id="lineage-explorer"><div class="e10-empty">Loading…</div></div>
  <div id="finding-panel" class="e10-empty" style="display:none"></div>
  <div class="screen-explainer">
    <div class="screen-explainer-title">What is the Lineage Explorer?</div>
    <p>Every object in Hermeneia has a traceable origin. This screen lets you walk the chain from any rendered report back to the exact passages in the source document that produced it. Nothing is asserted without evidence. Nothing is lost without a record.</p>
    <p>Lineage answers the question: <em>how did this conclusion get here?</em> From report → architect plan → blueprint → interpretation → observation → source document. Each link is preserved and auditable.</p>
    <p><strong>How to use it:</strong> Select a rendered narrative to trace its full lineage. Or navigate here from the Reader View using the "View Lineage" button on any report card.</p>
  </div>
</section>

<section class="section e10-screen" id="architect">
  <div class="sec-label">Screen 6 — Architect Explorer</div>
  <div id="architect-panel">
    <div class="e10-empty">Loading blueprints…</div>
  </div>

function buildCycleDiagram(pipeline, activeScreenId) {
  const CX = 220, CY = 220, R = 148;
  const toRad = d => d * Math.PI / 180;

  const screenNodes = [
    { id: 'corpus',    label: 'Corpus',    angle: 0   },
    { id: 'lab',       label: 'Lab',       angle: 60  },
    { id: 'review',    label: 'Review',    angle: 120 },
    { id: 'architect', label: 'Architect', angle: 180 },
    { id: 'reader',    label: 'Read',      angle: 240 },
    { id: 'critic',    label: 'Critic',    angle: 300 },
  ];

  // Map pipeline stage data by nav_target
  const byTarget = {};
  pipeline.forEach(s => { if (s.nav_target) byTarget[s.nav_target] = s; });
  if (!byTarget.review) byTarget.review = byTarget.lab;

  // Compute positions
  screenNodes.forEach(n => {
    n.nx = CX + R * Math.sin(toRad(n.angle));
    n.ny = CY - R * Math.cos(toRad(n.angle));
  });

  // Arrow lines at each arc midpoint (between consecutive nodes)
  const arrowLines = screenNodes.map((n, i) => {
    const midAngle = n.angle + 30; // halfway to next node (each 60° apart)
    const mx = CX + R * Math.sin(toRad(midAngle));
    const my = CY - R * Math.cos(toRad(midAngle));
    // Clockwise tangent at midAngle: (cos(midAngle), sin(midAngle))
    const tx = Math.cos(toRad(midAngle));
    const ty = Math.sin(toRad(midAngle));
    const s = 8;
    return `<line x1="${(mx - s*tx).toFixed(1)}" y1="${(my - s*ty).toFixed(1)}" x2="${(mx + s*tx).toFixed(1)}" y2="${(my + s*ty).toFixed(1)}" stroke="var(--dim2)" stroke-width="1.5" marker-end="url(#ob-arr)" opacity="0.65"/>`;
  }).join('');

  // Node buttons (absolutely positioned)
  const nodeHtml = screenNodes.map(n => {
    const stage = byTarget[n.id];
    let status = stage?.status || 'pending';
    if (n.id === activeScreenId) status = 'current';
    const count = stage?.count || 0;
    const top = Math.round(n.ny - 32);
    const left = Math.round(n.nx - 42);
    const statusMark = status === 'complete' ? '<div class="ob-cycle-node-status">✓ done</div>'
                     : status === 'current'  ? '<div class="ob-cycle-node-status">● active</div>'
                     : '';
    return `<button class="ob-cycle-node status-${status}" style="top:${top}px;left:${left}px" onclick="e10Go('${n.id}')">
      <div class="ob-cycle-node-label">${n.label}</div>
      ${count > 0 ? `<div class="ob-cycle-node-count">${count.toLocaleString()}</div>` : ''}
      ${statusMark}
    </button>`;
  }).join('');

  return `<div class="ob-cycle-wrap">
    <svg class="ob-cycle-svg" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ob-arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
          <polygon points="0,0 7,3.5 0,7" fill="var(--dim2)" opacity="0.7"/>
        </marker>
      </defs>
      <circle cx="220" cy="220" r="148" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="5 4"/>
      ${arrowLines}
      <circle cx="220" cy="220" r="56" fill="var(--surface2)" stroke="var(--border2)" stroke-width="1"/>
      <text x="220" y="212" text-anchor="middle" fill="var(--dim2)" font-size="11" font-family="inherit">understanding</text>
      <text x="220" y="227" text-anchor="middle" fill="var(--dim2)" font-size="11" font-family="inherit">deepens with</text>
      <text x="220" y="242" text-anchor="middle" fill="var(--dim2)" font-size="11" font-family="inherit">each pass ↺</text>
    </svg>
    ${nodeHtml}
  </div>`;
}

const _INV_KEY = 'hermeneia_investigation_v1';
function invLoad() {
  try { return JSON.parse(localStorage.getItem(_INV_KEY) || 'null'); } catch { return null; }
}
function invSave(obj) {
  try { localStorage.setItem(_INV_KEY, JSON.stringify(obj)); } catch {}
}
function invClear() {
  try { localStorage.removeItem(_INV_KEY); } catch {}
}

let _setupTags = [];

function setupAddTag(value) {
  const v = (value || '').trim();
  if (!v || _setupTags.includes(v)) return;
  _setupTags.push(v);
  _renderSetupTags();
}

function setupRemoveTag(idx) {
  _setupTags.splice(idx, 1);
  _renderSetupTags();
}

function _renderSetupTags() {
  const row = document.getElementById('setup-tag-row');
  if (!row) return;
  row.innerHTML = _setupTags.map((t, i) =>
    `<span class="setup-tag">${x(t)}<button onclick="setupRemoveTag(${i})" title="Remove">×</button></span>`
  ).join('');
}

function setupTagKeydown(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    setupAddTag(e.target.value);
    e.target.value = '';
  }
}

function setupTagBlur(e) {
  if (e.target.value.trim()) {
    setupAddTag(e.target.value);
    e.target.value = '';
  }
}

function setupSubmit() {
  const thesis = document.getElementById('setup-thesis')?.value.trim() || '';
  const purpose = document.getElementById('setup-purpose')?.value.trim() || '';
  const reconsider = document.getElementById('setup-reconsider')?.value.trim() || '';
  if (!thesis) {
    document.getElementById('setup-thesis')?.focus();
    document.getElementById('setup-thesis-err').style.display = 'block';
    return;
  }
  document.getElementById('setup-thesis-err').style.display = 'none';
  invSave({ thesis, purpose, lenses: [..._setupTags], reconsider, created: new Date().toISOString() });
  e10Go('onboarding');
}

  const cycleNames  = { corpus:'Corpus', lab:'Lab', review:'Review', architect:'Architect', reader:'Read', critic:'Critic' };
  const activeNav   = currentStage?.nav_target || 'corpus';
  const activeIdx   = cycleStages.indexOf(activeNav);
  const prevNav     = cycleStages[(activeIdx - 1 + cycleStages.length) % cycleStages.length];
  const nextNav     = cycleStages[(activeIdx + 1) % cycleStages.length];
  const cycleNavHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;max-width:400px;margin:8px auto 0;padding:0 4px">
      <button onclick="e10Go('${prevNav}')"
        style="display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;cursor:pointer;color:var(--fg2);font-size:13px;font-weight:600;white-space:nowrap">
        ← ${cycleNames[prevNav]}
      </button>
      <button onclick="e10Go('${activeNav}')"
        style="background:var(--accent);color:#000;border:none;border-radius:var(--r);padding:7px 18px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap">
        ${cycleNames[activeNav]} ↗
      </button>
      <button onclick="e10Go('${nextNav}')"
        style="display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;cursor:pointer;color:var(--fg2);font-size:13px;font-weight:600;white-space:nowrap">
        ${cycleNames[nextNav]} →
      </button>
    </div>`;

  host.innerHTML = `
    <div class="onboarding-panel">

      <div style="text-align:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);margin-bottom:2px">${progressText}</div>
      ${buildCycleDiagram(pipeline, activeNav)}
      ${cycleNavHtml}

      ${invBannerHtml}

      <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
        ${uploadHtml}
        ${recentDocsHtml}
        ${understandingHtml}
      </div>

      <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-trace" onclick="e10Go('guide')">Guide</button>
        <button class="btn-trace" onclick="e10Go('constitution')">Constitution</button>
      </div>
    </div>`;

  // Bloom animation: cycle diagram grows from nav bar position
  const cycleWrap = host.querySelector('.ob-cycle-wrap');
  if (cycleWrap) {
    cycleWrap.classList.remove('blooming', 'shrinking');
    void cycleWrap.offsetWidth; // force reflow
    cycleWrap.classList.add('blooming');
    cycleWrap.addEventListener('animationend', () => cycleWrap.classList.remove('blooming'), { once: true });
  }

  // Update nav mini cycle with real statuses from this pipeline
  const navStatuses = {};
  pipeline.forEach(s => {
    if (s.nav_target) navStatuses[s.nav_target] = s.status === 'complete' ? 'complete' : (s.status === 'current' ? 'active' : 'pending');
  });
  updateNavCycle(activeNav, navStatuses);
}

// ── Bookmarks (localStorage) ───────────────────────────
const _BM_KEY = 'hermeneia_bookmarks_v1';
function bmLoad() {
  try { return new Set(JSON.parse(localStorage.getItem(_BM_KEY) || '[]')); }
  catch { return new Set(); }
}
function bmSave(set) {
  try { localStorage.setItem(_BM_KEY, JSON.stringify([...set])); } catch {}
}
function bmToggle(obsId, event) {
  event.stopPropagation();
  const bm = bmLoad();
  if (bm.has(obsId)) bm.delete(obsId); else bm.add(obsId);
  bmSave(bm);
  // Re-render the list so bookmark filter and icons update
  const filter = document.getElementById('obs-filter')?.value || 'all';
  if (filter === 'bookmarked') {
    e10LoadObservations();
  } else {
    // Just flip the icon and class in place
    const card = event.target.closest('.e10-observation');
    if (card) {
      card.classList.toggle('bookmarked', bm.has(obsId));
      const btn = card.querySelector('.obs-bookmark-btn');
      if (btn) btn.textContent = bm.has(obsId) ? '🔖' : '○';
    }
  }
}

function obToggleExtract() {
  const panel = document.getElementById('ob-extract-panel');
  if (!panel) return;

  const btn = document.getElementById('ob-extract-toggle');
  if (btn) btn.style.borderColor = panel.classList.contains('open') ? 'var(--accent)' : '';

async function obExtractBlueprint(save) {
  const text     = document.getElementById('ob-extract-text')?.value?.trim();
  const provider = document.getElementById('ob-extract-provider')?.value || 'null';
  const propEl   = document.getElementById('ob-extract-proposal');
  const btn      = document.getElementById('ob-extract-btn');
  if (!text) { alert('Paste your document text first.'); return; }
  if (!propEl) return;

  btn.disabled = true;
  btn.textContent = 'Extracting…';
  propEl.style.display = 'none';

  try {
    const resp = await fetch('/api/pipeline/extract-blueprint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, provider, save }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      propEl.style.display = 'block';
      propEl.innerHTML = `<div style="color:#f87171;font-size:13px">✗ ${data.error || 'Extraction failed'}</div>`;
      return;
    }
    const bp = data.proposed_blueprint;
    const sections = (bp.sections || []).map((s, i) =>
      `<div class="ob-extract-section"><span style="color:var(--dim2);font-size:11px;margin-right:6px">${i+1}.</span>${x(s.claim)}</div>`
    ).join('');
    const savedBadge = data.blueprint_id
      ? `<span style="background:#2d6a4f;color:#b7e4c7;font-size:10px;padding:2px 7px;border-radius:4px;margin-left:8px">saved</span>` : '';
    propEl.style.display = 'block';
    propEl.innerHTML = `
      <div class="ob-extract-proposal">
        <div class="ob-extract-proposal-title">${x(bp.title)}${savedBadge}</div>
        <div class="ob-extract-proposal-thesis">"${x(bp.thesis)}"</div>
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim2);margin-bottom:6px">Supporting Claims</div>
        ${sections}
        <div class="ob-extract-note">
          A wrong Blueprint is not a planning failure — it is a reading failure.
          If this reconstruction is inaccurate, edit the section claims below or run again with a different provider.
        </div>
        ${data.blueprint_id ? `
        <div class="ob-extract-actions">
          <button class="btn-primary" onclick="e10Go('architect')">View in Architect →</button>
          <button class="btn-trace" onclick="obToggleExtract()">Done</button>
        </div>` : `
        <div class="ob-extract-actions">
          <button class="btn-primary" onclick="obExtractBlueprint(true)">Ratify &amp; Save Blueprint →</button>
          <button class="btn-trace" onclick="obToggleExtract()">Discard</button>
        </div>`}
      </div>`;
  } catch (err) {
    propEl.style.display = 'block';
    propEl.innerHTML = `<div style="color:#f87171;font-size:13px">✗ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Extract Intent Hypothesis';
  }
}

async function obUploadFile(file) {
  const statusEl = document.getElementById('ob-upload-status');
  const zoneEl   = document.getElementById('ob-upload-zone');
  if (!statusEl || !zoneEl) return;

  if (!file.name.toLowerCase().endsWith('.pdf')) {
    statusEl.style.display = 'block';
    statusEl.innerHTML = `<div class="ob-upload-progress"><div class="ob-upload-status"><span class="err">✗ Only PDF files are supported.</span></div></div>`;

  zoneEl.style.display = 'none';

  statusEl.innerHTML = `<div class="ob-upload-progress">
    <div class="ob-upload-status">
      <div>📄 ${x(file.name)}</div>
      <div style="color:var(--dim2);margin-top:6px">Compiling corpus — extracting observations and indexing terms…</div>
    </div>
  </div>`;

  const form = new FormData();
  form.append('file', file);

  let result;
  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: form });
    result = await resp.json();
    if (!resp.ok) throw new Error(result.error || 'Upload failed');
  } catch (err) {
    statusEl.innerHTML = `<div class="ob-upload-progress"><div class="ob-upload-status">
      <div>📄 ${x(file.name)}</div>
      <span class="err">✗ ${x(String(err.message))}</span>

  statusEl.innerHTML = `<div class="ob-upload-progress"><div class="ob-upload-status">
    <div style="font-weight:650;color:var(--fg);margin-bottom:8px">📄 ${x(result.filename)}</div>

function _groupByDoc(observations) {

    map[key].push(r);
  }
  return order.map(k => ({ docName: k, rows: map[k] }));
}

function _makeDistBar(pages, totalPages, BAR = 52) {
  const bar = Array(BAR).fill('·');
  pages.forEach(p => {
    const pos = Math.round(((p - 1) / Math.max(totalPages, 1)) * (BAR - 1));
    bar[Math.min(pos, BAR - 1)] = '×';
  });
  const sorted = [...pages].sort((a,b) => a - b);
  const spread = sorted[sorted.length - 1] - sorted[0];
  const note = spread === 0
    ? 'all on one page'
    : spread < totalPages * 0.15
    ? `clustered within ${spread} pages`
    : `spread across ${spread} pages`;
  return { bar: bar.join(''), note, totalPages };
}

    const docMax = multiDoc
      ? Math.max(...pages)
      : (_corpusTotalPages || Math.max(...pages, 1));
    const { bar, note } = _makeDistBar(pages, docMax);

    const cards = rows.map(r => {
      const safe = x(r.raw_text);

    const docHeader = multiDoc
      ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
           <span class="obs-provenance role-${role}" style="font-size:11px">${x(label)} · ${role}</span>
           <span style="font-size:11px;color:var(--dim2)">${rows.length} occurrence${rows.length !== 1 ? 's' : ''}</span>

      : '';

    return `
      <div style="${multiDoc ? 'border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px;background:var(--bg)' : ''}">
        ${docHeader}
        <div style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
          ${!multiDoc ? `<div><div style="font-size:10px;color:var(--dim2);margin-bottom:2px;letter-spacing:.06em">OCCURRENCES</div><div style="font-size:20px;font-weight:700;color:var(--fg)">${rows.length}</div></div>` : ''}
          <div>
            <div style="font-size:10px;color:var(--dim2);margin-bottom:2px;letter-spacing:.06em">PAGES</div>
            <div style="font-size:12px;color:var(--fg2);font-family:var(--mono)">${uniquePages.join(', ')}</div>

            <div style="font-size:11px;font-family:var(--mono);color:var(--dim2);letter-spacing:1px;line-height:1">${bar}</div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim2);margin-top:2px;font-family:var(--mono)"><span>p.1</span><span>p.${docMax}</span></div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start">${cards}</div>
      </div>`;
  }).join('');

  host.innerHTML = `
    <div style="border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:20px;background:var(--surface)">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">

          <span style="font-size:16px;font-weight:600;color:var(--fg);margin-left:10px">"${x(q)}"</span>

        </div>

          Send All to Lab →

      <div id="pattern-obs-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>`;

  const listHost = document.getElementById('pattern-obs-list');
  const details = await Promise.all(checked.map(id => get(`/api/e10/observations/${encodeURIComponent(id)}`).catch(() => null)));
  if (listHost) {
    listHost.innerHTML = details.filter(Boolean).map(d => {
      const o = d.observation || d;

      const hi = safe.replace(new RegExp(`(${esc(x(q))})`, 'gi'), '<em>$1</em>');
      return `<div style="padding:10px 12px;background:var(--bg);border-radius:4px;font-size:12px;color:var(--fg2);line-height:1.6;border-left:2px solid var(--border)">

  // Prime the E10 selection with the first obs so Generate Interpretations fires
  if (checked.length > 0) {
    _e10Selected = checked[0];
    const first = details.find(Boolean);
    if (first) _e10Detail = first;
  }
}

// ── Trace ──────────────────────────────────────────────
async function trace(n, btn) {
  if (_activeBtn === btn && btn.classList.contains('active')) {
    document.getElementById('trace').innerHTML = '';
    _layers = []; btn.classList.remove('active'); _activeBtn = null; return;
  }
  if (_activeBtn) _activeBtn.classList.remove('active');
  btn.classList.add('active'); _activeBtn = btn;

  const hSpan = btn.querySelector ? btn.querySelector('.ho') : null;
  if (hSpan) hSpan.textContent = '…';
  btn.disabled = true;

  const [data, pdata] = await Promise.all([
    get(`/api/trace/${n}`),
    _profiles.length ? Promise.resolve({profiles:_profiles}) : get('/api/profiles'),
  ]);
  _layers = data.layers;
  _lineageGraph = null;
  if (pdata.profiles) _profiles = pdata.profiles;

  btn.disabled = false;
  if (hSpan) hSpan.textContent = 'See where this came from';

  redrawTrace(true);
}

function redrawTrace(animate = false) {
  const panel = document.getElementById('trace');
  panel.innerHTML = '';
  if (!animate) {
    _layers.forEach((layer, i) => {
      if (i > 0) panel.appendChild(el('div','trace-arrow','↓'));
      panel.appendChild(el('div','trace-layer', layerHTML(layer)));
    });
    return;
  }
  (async () => {
    await sleep(20);
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    for (let i = 0; i < _layers.length; i++) {
      if (i > 0) { await sleep(100); panel.appendChild(el('div','trace-arrow','↓')); }
      await sleep(i === 0 ? 0 : 260);
      panel.appendChild(el('div','trace-layer', layerHTML(_layers[i])));
    }
  })();
}

    "Interpretation": {"icon":"💡","title":"Idea","subtitle":"What someone thought it meant"},
    "Observation": {"icon":"👀","title":"What someone noticed","subtitle":"The exact noticed passage"},
    "SourceExtraction": {"icon":"📄","title":"Original text","subtitle":"The parser's exact text"},
    "SourceDocument": {"icon":"📚","title":"Original document","subtitle":"The file it came from"}
  }
};

async function lineage(renderedNarrativeId, btn) {
  if (btn) btn.disabled = true;
  try {
    const graph = await get(`/api/lineage/rendered_narrative/${encodeURIComponent(renderedNarrativeId)}`);
    _lineageGraph = graph;
    _layers = [];
    if (_activeBtn) _activeBtn.classList.remove('active');
    _activeBtn = null;
    redrawLineage(true);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function redrawLineage(animate = false) {
  const panel = document.getElementById('trace');
  panel.innerHTML = lineageHTML(_lineageGraph);
  if (animate) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function lineageHTML(graph) {
  if (!graph) return '';
  const mode = _expert ? 'expert' : 'universal';
  const byClass = new Map();
  for (const node of graph.nodes || []) {
    if (!byClass.has(node.class)) byClass.set(node.class, []);
    byClass.get(node.class).push(node);
  }
  const groups = LINEAGE_ORDER
    .filter(cls => byClass.has(cls))
    .map(cls => ({ cls, nodes: byClass.get(cls) }));

  return `<div class="lineage-panel" data-lineage-root="${x(graph.root?.class||'')}:${x(graph.root?.id||'')}">
    <div class="lineage-head">
      <div>
        <div class="lineage-title">
          <span class="ho">Where this came from</span>
          <span class="xo">Canonical Lineage Graph</span>
        </div>
        <div class="lineage-sub">
          <span class="ho">Same graph. Simpler words.</span>
          <span class="xo">Ontology returned by /api/lineage; labels applied client-side.</span>
        </div>
      </div>
      <button class="lineage-vocab" onclick="toggleExpert()">
        <span class="ho">Expert labels</span>
        <span class="xo">Universal labels</span>
      </button>
    </div>
    <div class="lineage-body">
      ${groups.map((group, i) => `
        ${i > 0 ? '<div class="lineage-flow">↓</div>' : ''}
        <div class="lineage-class" data-lineage-class="${x(group.cls)}">
          <div class="lineage-class-title xo">${x(group.cls)}</div>
          ${group.nodes.map(node => lineageNodeHTML(node, mode)).join('')}
        </div>
      `).join('')}
    </div>
  </div>`;
}

function lineageNodeHTML(node, mode) {
  const meta = (LINEAGE_VOCAB[mode] || LINEAGE_VOCAB.universal)[node.class] || {
    icon: '◈', title: node.class, subtitle: ''
  };
  const key = lineageNodeKey(node);
  return `<div>
    <button class="lineage-node" data-node-key="${x(key)}" onclick="toggleLineageNode(this)">
      <span class="lineage-icon">${meta.icon}</span>
      <span>
        <span class="lineage-node-title">${x(meta.title)}</span>
        <span class="lineage-node-sub">${x(meta.subtitle)}</span>
        <span class="lineage-node-id">${x(node.class)} · ${x(shortId(node.id))}</span>
      </span>
    </button>
    <div class="lineage-detail">${lineageDetailHTML(node)}</div>
  </div>`;
}

function lineageDetailHTML(node) {
  const data = node.data || {};
  const rows = [
    ['class', node.class],
    ['id', node.id],
    ...Object.entries(data)
      .filter(([_, value]) => value !== null && value !== undefined && value !== '')
      .slice(0, 8)
  ];
  return rows.map(([k, v]) => `<div class="lineage-kv">
    <div class="lineage-k">${x(k)}</div>
    <div class="lineage-v">${x(formatLineageValue(v))}</div>
  </div>`).join('');
}

function toggleLineageNode(btn) {
  btn.classList.toggle('open');
  const detail = btn.nextElementSibling;
  if (detail) detail.classList.toggle('open');
}

function lineageNodeKey(node) {
  return `${node.class}:${node.id}`;
}

async function loadTrustCard(renderedNarrativeId) {
  const host = [...document.querySelectorAll('[data-trust-for]')]

function trustCardHTML(summary) {
  const checks = summary.checks || {};
  return `<div class="trust-card" data-trust-summary="${x(summary.rendered_narrative_id || '')}">

      <span class="trust-icon">🛡️</span>

      </button>
      <div class="trust-explain">

function toggleTrustWhy(btn) {

function trustRowHTML(item, finding) {
  const status = finding?.status || 'pending';
  const display = {
    pass: { mark: '✓', cls: 'trust-pass' },
    fail: { mark: '✗', cls: 'trust-fail' },
    pending: { mark: '○', cls: 'trust-pending' }
  }[status] || { mark: '○', cls: 'trust-pending' };
  return `<div class="trust-row" data-trust-key="${x(item.key)}" data-trust-status="${x(status)}">
    <span><span class="ho">${x(item.human)}</span><span class="xo">${x(item.expert)}</span></span>
