// ── Layer vocabulary ────────────────────────────────────
const LMETA = {
  observation:     { e:'📄', h:'Source Passage',      hs:'The original text',                          xh:'Layer 0 — Observation' },
  interpretations: { e:'💡', h:'What It Means',       hs:'How scholars read this passage',              xh:'Layer 1 — Interpretations' },
  perspectives:    { e:'🔭', h:'Viewpoints',          hs:'The lenses applied to this text',             xh:'Perspectives' },
  blueprint:       { e:'📋', h:'Narrative Plan',      hs:'How the story will be structured',            xh:'Layer 3 — Narrative Blueprint' },
  architect:       { e:'📐', h:'Writing Contract',    hs:'Semantic commitments the Artist must honor',  xh:'Architect' },
  artist:          { e:'✍️', h:'Written Expressions', hs:'How this has been written so far',            xh:'Artist' },
  critic:          { e:'✅', h:'Quality Review',      hs:'How faithfully the contract was kept',        xh:'Critic' },
  essay:           { e:'🎭', h:'Authorship',          hs:'Current status of this piece',                xh:'Layer 4 — Authorship' },
};

function lhead(type, badgeCls, badgeText) {
  const m = LMETA[type] || { e:'◈', h:type, hs:'', xh:type };
  const badge = badgeText
    ? `<div class="lhead-badge ${badgeCls}">${badgeText}</div>` : '';
  return `<div class="lhead">
  <div class="lhead-emoji">${m.e}</div>
  <div class="lhead-info">
    <div class="lhead-title ho">${m.h}</div>
    <div class="lhead-title xo">${m.xh}</div>
    <div class="lhead-sub ho">${m.hs}</div>
  </div>
  ${badge}
</div>`;
}

function layerHTML(layer) {
  const notYet = (type) =>
    `<div class="lcard"><div>${lhead(type,'badge-pending','Not yet')}</div>
    <div class="lbody" style="color:var(--dim2);font-size:15px;font-style:italic">
      <span class="ho">Not yet created.</span>
      <span class="xo">(not yet generated)</span>
    </div></div>`;

  if (!layer.exists && layer.type !== 'essay') return notYet(layer.type);

  switch (layer.type) {

  case 'observation':
    return `<div class="lcard lcard-hi">
      ${lhead('observation','badge-done','✓')}
      <div class="lbody">
        <div class="obs-quote">"${x(layer.content.text)}"</div>
        <div class="obs-page ho">Page ${layer.content.page}</div>
        <div class="obs-meta xo">p.${layer.content.page} · §${layer.content.paragraph} · s${layer.content.sentence}
          &ensp;·&ensp;OBS-${layer.content.obs_index}
          &ensp;·&ensp;${layer.content.id.slice(0,16)}…</div>
      </div>
    </div>`;

  case 'interpretations':
    return `<div class="lcard">
      ${lhead('interpretations','badge-done',`${layer.content.length} reading${layer.content.length!==1?'s':''}`)}
      <div class="lbody">
        ${layer.content.map(it => `
          <div class="interp">
            <div class="interp-lens">
              ${x(it.perspective)}
              <span class="chip chip-${it.evidential_status}">${it.evidential_status}</span>
            </div>
            <div class="interp-text">"${x(it.text)}"</div>
          </div>`).join('')}
      </div>
    </div>`;

  case 'perspectives':
    return `<div class="lcard">
      ${lhead('perspectives','badge-done',`${layer.content.length}`)}
      <div class="lbody">
        ${layer.content.map(p => `
          <div class="persp-row">
            <span class="persp-name">${x(p.name)}</span>
            <span class="persp-desc">${x(p.description)}</span>
          </div>`).join('')}
      </div>
    </div>`;

  case 'blueprint':
    return `<div class="lcard">
      ${lhead('blueprint','badge-done','✓')}
      <div class="lbody">
        <div class="bp-title">${x(layer.content.title)}</div>
        <div class="bp-thesis">"${x(layer.content.thesis)}"</div>
        <div class="bp-meta xo">${layer.content.section_count} section${layer.content.section_count!==1?'s':''}</div>
      </div>
    </div>`;

  case 'architect': {
    if (!layer.exists) return `<div class="lcard">
      ${lhead('architect','badge-pending','Not yet')}
      <div class="lbody" style="color:var(--dim2);font-size:15px">
        <span class="ho">A writing contract hasn't been drawn up yet.</span>
        <span class="xo">No Architect Plan. Run: herm architect OBS-N</span>
      </div>
    </div>`;
    const stale = layer.content.stale;
    return `<div class="lcard ${stale ? 'lcard-warn' : ''}">
      ${lhead('architect', stale ? 'badge-warn' : 'badge-done', stale ? '⚠ Out of date' : '✓')}
      <div class="lbody">
        <div class="bp-title">${x(layer.content.title)}</div>
        ${stale ? `<div style="color:var(--yellow);font-size:14px;margin-top:8px">
          <span class="ho">The plan is out of date — the narrative blueprint has changed.</span>
          <span class="xo">Blueprint has changed since this plan was generated.</span>
        </div>` : ''}
        <div class="bp-meta xo" style="margin-top:8px">${layer.content.paragraph_count} paragraph${layer.content.paragraph_count!==1?'s':''} · deterministic</div>
      </div>
    </div>`;
  }

  case 'artist': {
    const renders = layer.content || [];
    const doneSet = new Set(renders.map(r => r.profile_slug).filter(Boolean));
    const cards = renders.map(r => {
      const lang = r.profile_language && r.profile_language !== 'en'
        ? `<span class="render-lang">[${x(r.profile_language)}]</span>` : '';
      return `<div class="render-card">
        <span class="render-name">${r.profile_name ? x(r.profile_name) : 'Default'}</span>
        ${lang}
        <span class="render-prov xo">${x(r.provider)}</span>
      </div>`;
    }).join('');

    const plist = _profiles.length ? `<div class="profile-list">
      <div class="profile-list-hd">
        <span class="ho">Available expressions</span>
        <span class="xo">Expression Profiles</span>
      </div>
      ${_profiles.map(p => {
        const done = doneSet.has(p.slug);
        const lang = p.language && p.language !== 'en' ? ` [${x(p.language)}]` : '';
        return `<div class="profile-row ${done ? 'done' : ''}">
          <span class="profile-row-name">${x(p.name)}${lang}</span>
          ${done
            ? '<span class="profile-done">Written ✓</span>'
            : `<span class="profile-cmd xo">herm artist OBS-N --profile ${x(p.slug)}</span>`}
        </div>`;
      }).join('')}
    </div>` : '';

    if (!layer.exists) return `<div class="lcard">
      ${lhead('artist','badge-pending','Nothing written yet')}
      <div class="lbody">${plist}</div>
    </div>`;
    return `<div class="lcard">
      ${lhead('artist','badge-done',`${renders.length} written`)}
      <div class="lbody">${cards}${plist}</div>
    </div>`;
  }

  case 'critic': {
    const reports = layer.content || [];
    if (!layer.exists) return `<div class="lcard">
      ${lhead('critic','badge-pending','Not reviewed')}
      <div class="lbody" style="color:var(--dim2);font-size:15px">
        <span class="ho">This piece hasn't been reviewed yet.</span>
        <span class="xo">Run: herm critic OBS-N</span>
      </div>
    </div>`;
    const cards = reports.map(r => {
      const col = r.semantic_fidelity >= 80 ? 'var(--green)'
                : r.semantic_fidelity >= 50 ? 'var(--yellow)' : 'var(--red)';
      const pb = r.profile_name
        ? `<div style="font-size:13px;color:var(--dim2);margin-bottom:8px">${x(r.profile_name)}</div>` : '';
      const miss = r.required_terms_missing.length
        ? `<div class="critic-missing">Missing: ${r.required_terms_missing.join(', ')}</div>` : '';
      const warn = r.warnings.length
        ? `<div class="critic-warn">${x(r.warnings[0])}</div>` : '';
      return `<div style="margin-bottom:16px">
        ${pb}
        <div class="critic-score" style="color:${col}">${r.semantic_fidelity}%</div>
        <div class="critic-status" style="color:${r.approved?'var(--green)':'var(--red)'}">
          <span class="ho">${r.approved ? '✓ Approved' : '✗ Not yet approved'}</span>
          <span class="xo">${r.approved ? 'APPROVED ✓' : 'NOT APPROVED ✗'}</span>
        </div>
        ${miss}${warn}
      </div>`;
    }).join('<hr style="border-color:var(--border);margin:12px 0">');
    return `<div class="lcard">
      ${lhead('critic','','')}
      <div class="lbody">${cards}</div>
    </div>`;
  }

  case 'essay': {
    const lx    = t => (_layers.find(l => l.type === t) || {}).exists;
    const arch  = _layers.find(l => l.type === 'architect') || {};
    const artist= _layers.find(l => l.type === 'artist') || {};
    const crit  = _layers.find(l => l.type === 'critic') || {};
    const hArch  = arch.exists, stale = arch.content?.stale;
    const hArtist = (artist.content || []).length > 0;
    const critRpts = crit.content || [];
    const hCritic  = critRpts.length > 0;
    const approved = critRpts.some(r => r.approved);

    const hStatus = approved   ? '✅ Ready to read'
      : stale                  ? '⚠️ Plan needs updating'
      : hArtist                ? '🔄 Under review'
      : hArch                  ? '✍️ Awaiting writing'
      :                          '⏳ Awaiting plan';
    const hReason = approved
      ? 'This piece has been written and approved by the Critic.'
      : stale   ? 'The writing plan is out of date and should be regenerated.'
      : hArtist ? 'A written version exists and is waiting for the Critic\'s review.'
      : hArch   ? 'The writing contract is ready. An Artist can now render prose.'
      :           'The writing contract hasn\'t been drawn up yet.';
    const xStatus = approved           ? '🟢 Approved'
      : hArch && !stale                ? '🟡 In progress'
      :                                  '⚪ Waiting';

    const stageRow = (hName, xName, st) =>
      `<div class="pipe-row">
        <span class="pipe-name ${st}">
          <span class="ho">${hName}</span>
          <span class="xo">${xName}</span>
        </span>
        <span class="pipe-check ${st}">${st==='done'?'✓':st==='warn'?'⚠':'○'}</span>
      </div>`;

    return `<div class="lcard">
      ${lhead('essay','','')}
      <div class="lbody">
        <div class="auth-status">
          <span class="ho">${hStatus}</span>
          <span class="xo">${xStatus}</span>
        </div>
        <div class="auth-reason">
          <span class="ho">${x(hReason)}</span>
          <span class="xo">${
            approved  ? 'Semantic contract fulfilled.'
            : stale   ? 'Architect plan is out of date.'
            : hArtist ? 'Awaiting Critic validation.'
            : hArch   ? 'No Artist has been appointed.'
            :           'No Architect has been appointed.'}</span>
        </div>
        <div class="pipe-cols">
          <div class="pipe-col">
            <div class="pipe-col-hd">
              <span>Understanding</span>
            </div>
            ${stageRow('Passage',        'Observation',    lx('observation')     ? 'done':'pending')}
            ${stageRow('Readings',       'Interpretation', lx('interpretations') ? 'done':'pending')}
            ${stageRow('Viewpoints',     'Perspective',    lx('perspectives')    ? 'done':'pending')}
            ${stageRow('Narrative Plan', 'Blueprint',      lx('blueprint')       ? 'done':'pending')}
          </div>
          <div class="pipe-div"></div>
          <div class="pipe-col">
            <div class="pipe-col-hd ${hArch && !stale ? '' : 'dim'}">Composition</div>
            ${stageRow('Plan',    'Architect', hArch && !stale ? 'done' : stale ? 'warn' : 'pending')}
            ${stageRow('Writing', 'Artist',    hArtist  ? 'done' : 'pending')}
            ${stageRow('Review',  'Critic',    approved ? 'done' : hCritic ? 'warn' : 'pending')}
          </div>
        </div>
      </div>
    </div>`;
  }

  default:
    return `<div class="lcard">
      <div class="lhead"><div class="lhead-info"><div class="lhead-title">${x(layer.name||layer.type)}</div></div></div>
      <div class="lbody" style="color:var(--dim2)">${x(JSON.stringify(layer.content))}</div>
    </div>`;
  }
}

async function toggleMatrix() {

    body.innerHTML = ''; btn.textContent = 'Show';

async function cellClick(bpIdx, slug, btn) {
  const bp   = _matrixData.blueprints[bpIdx];
  const pro  = _matrixData.profiles.find(p => p.slug === slug);
  const cell = bp.cells[slug];

  document.querySelectorAll('.mdetail').forEach(d => d.remove());
  if (_activeCell === btn) {
    btn.classList.remove('active'); _activeCell = null; return;
  }
  if (_activeCell) _activeCell.classList.remove('active');
  _activeCell = btn; btn.classList.add('active');

  const pname = pro ? pro.name : slug;
  const lang  = pro && pro.language !== 'en'
    ? ` <span style="color:var(--dim2)">[${x(pro.language)}]</span>` : '';
  let html = `<div class="mdetail"><div class="mdetail-title">${x(pname)}${lang}</div>`;

  if (!cell || !cell.rendered) {
    const ha = !!bp.architect_plan_id;
    html += `

    ? '<span style="color:var(--dim2)">○ Not evaluated</span>'

    profileSlug

        <div class="provider-model">${x(provider.model_id || narrative.provider_identity || 'model not recorded')}</div>

      </div>

        <div class="provider-verdict">${verdict}</div>

    </div>
    <div class="provider-actions">
      <a class="provider-action" href="${x(contractUrl)}" target="_blank">
        <span class="ho">See what this version kept</span>
        <span class="xo">Semantic Contract</span>

function buildMatrix({ profiles, blueprints }) {
  if (!blueprints.length)
    return '<div style="color:var(--dim2);font-size:15px;margin-top:16px;font-style:italic">No blueprints yet.</div>';

  const ths = profiles.map(p => {
    const lang = p.language !== 'en' ? `<span class="mcell-lang">[${x(p.language)}]</span>` : '';
    return `<th>${x(p.name)}${lang}</th>`;
  }).join('');

  const rows = blueprints.map((bp, bi) => {
    const cells = profiles.map(p => {
      const c = bp.cells[p.slug];
      let sym, cls, tip;
      if (!c || !c.rendered) {
        sym = '○'; cls = 'mcell-empty'; tip = 'Not yet written';
      } else {
        sym = String(c.render_count || 0);
        cls = 'mcell-count';
        tip = `${c.render_count || 0} provider realization${c.render_count===1?'':'s'}`
          + ` · ${c.reviewed_count || 0} reviewed`;
      }
      return `<td><button class="mcell ${cls}" title="${tip}"
        onclick="cellClick(${bi},'${x(p.slug)}',this)">${sym}</button></td>`;
    }).join('');
    const title = bp.title || (bp.id.slice(0,24)+'…');
    return `<tr><td class="bp-td" title="${x(bp.title||'')}">${x(title)}</td>${cells}</tr>`;
  }).join('');

  return `<div class="matrix-scroll">
  <table class="matrix-tbl">
    <thead><tr>
      <th class="bp-th">
        <span class="ho">Narrative</span>
        <span class="xo">Blueprint</span>
      </th>${ths}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div>
<div class="matrix-legend">
  <span><span class="mcell-count">N</span> Number of Artist realizations</span>
  <span><span class="mcell-empty">○</span> Not yet written</span>
</div>`;
}

// ── E10 workflow ──────────────────────────────────────
const _STAGE_ORDER = ['corpus', 'lab', 'review', 'architect', 'reader', 'critic'];
const _STAGE_NAMES = {
  corpus: 'Corpus', lab: 'Lab', review: 'Review',
  architect: 'Architect', reader: 'Read', critic: 'Critic',
  onboarding: 'Start', guide: 'Guide', lineage: 'Lineage',
};
let _currentStageId = 'onboarding';

function _updateStageNavBar(id) {
  _currentStageId = id;
  const idx = _STAGE_ORDER.indexOf(id);
  const inCycle = idx !== -1;
  const bar = document.getElementById('stage-nav-bar');
  if (!bar) return;

  const currentEl = document.getElementById('stage-nav-current');
  const prevBtn   = document.getElementById('stage-nav-prev');
  const nextBtn   = document.getElementById('stage-nav-next');
  const prevLabel = document.getElementById('stage-nav-prev-label');
  const nextLabel = document.getElementById('stage-nav-next-label');

  if (currentEl) currentEl.textContent = _STAGE_NAMES[id] || id;

  if (inCycle) {
    const prevIdx = (idx - 1 + _STAGE_ORDER.length) % _STAGE_ORDER.length;
    const nextIdx = (idx + 1) % _STAGE_ORDER.length;
    const prevId  = _STAGE_ORDER[prevIdx];
    const nextId  = _STAGE_ORDER[nextIdx];
    if (prevLabel) prevLabel.textContent = _STAGE_NAMES[prevId];
    if (nextLabel) nextLabel.textContent = _STAGE_NAMES[nextId];
    if (prevBtn)   prevBtn.classList.remove('disabled');
    if (nextBtn)   nextBtn.classList.remove('disabled');
  } else {
    if (prevLabel) prevLabel.textContent = 'Previous';
    if (nextLabel) nextLabel.textContent = 'Next';
    if (prevBtn)   prevBtn.classList.add('disabled');
    if (nextBtn)   nextBtn.classList.add('disabled');
  }
}

function stageNavStep(direction) {
  const idx = _STAGE_ORDER.indexOf(_currentStageId);
  if (idx === -1) return;
  const nextIdx = (idx + direction + _STAGE_ORDER.length) % _STAGE_ORDER.length;
  e10Go(_STAGE_ORDER[nextIdx]);
}

// ── Nav mini cycle ────────────────────────────────────────────────────────────
const _NAV_NODES = [
  { id: 'corpus',    label: 'Corpus',    angle: 0   },
  { id: 'lab',       label: 'Lab',       angle: 60  },
  { id: 'review',    label: 'Review',    angle: 120 },
  { id: 'architect', label: 'Architect', angle: 180 },
  { id: 'reader',    label: 'Read',      angle: 240 },
  { id: 'critic',    label: 'Critic',    angle: 300 },
];
const _NAV_STAGES = ['corpus','lab','review','architect','reader','critic'];
const _NAV_STAGE_NAMES = { corpus:'Corpus', lab:'Lab', review:'Review', architect:'Architect', reader:'Read', critic:'Critic', onboarding:'Home', setup:'Setup', guide:'Guide', constitution:'Constitution', lineage:'Lineage' };

let _navCycleStatuses = {};

async function refreshNavCycleStatuses() {
  const d = await fetch('/api/project/summary').then(r => r.json()).catch(() => null);
  if (!d?.pipeline) return;
  const next = {};
  d.pipeline.forEach(s => {
    if (s.nav_target) next[s.nav_target] = s.status === 'complete' ? 'complete' : (s.status === 'current' ? 'active' : 'pending');
  });
  if (!next.review && next.lab) next.review = next.lab;
  _navCycleStatuses = next;
}

function updateNavCycle(activeId, statuses) {
  if (statuses) _navCycleStatuses = statuses;
  // review shares nav_target with lab — mirror its status
  if (!_navCycleStatuses.review && _navCycleStatuses.lab)
    _navCycleStatuses.review = _navCycleStatuses.lab;
  const svg = document.getElementById('nav-mini-cycle-svg');
  const nameEl = document.getElementById('nav-mini-stage-name');
  if (!svg) return;

  const CX = 50, CY = 50, R = 36;
  const toRad = d => d * Math.PI / 180;

  // Build arc segments between nodes for completed stages
  let arcPaths = '';
  _NAV_NODES.forEach((n, i) => {
    const status = _navCycleStatuses[n.id] || 'pending';
    if (status !== 'complete') return;
    // Arc from this node to the next
    const a1 = n.angle, a2 = n.angle + 60;
    const x1 = CX + R * Math.sin(toRad(a1)), y1 = CY - R * Math.cos(toRad(a1));
    const x2 = CX + R * Math.sin(toRad(a2)), y2 = CY - R * Math.cos(toRad(a2));
    arcPaths += `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 0,1 ${x2.toFixed(2)},${y2.toFixed(2)}" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" opacity="0.7"/>`;
  });

  // Clockwise direction arrow at top-right midpoint (between corpus & lab)
  const arrAngle = 30, s = 5;
  const ax = CX + R * Math.sin(toRad(arrAngle)), ay = CY - R * Math.cos(toRad(arrAngle));
  const tx = Math.cos(toRad(arrAngle)), ty = Math.sin(toRad(arrAngle));
  const arrMark = `<defs><marker id="nmc-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0,0 6,3 0,6" fill="var(--dim2)" opacity="0.8"/></marker></defs>
  <line x1="${(ax-tx*s).toFixed(1)}" y1="${(ay-ty*s).toFixed(1)}" x2="${(ax+tx*s).toFixed(1)}" y2="${(ay+ty*s).toFixed(1)}" stroke="var(--dim2)" stroke-width="1.5" marker-end="url(#nmc-arr)" opacity="0.7"/>`;

  // Node dots
  let nodeSvg = '';
  _NAV_NODES.forEach(n => {
    const nx = CX + R * Math.sin(toRad(n.angle));
    const ny = CY - R * Math.cos(toRad(n.angle));
    const status = _navCycleStatuses[n.id] || 'pending';
    const isActive = n.id === activeId;
    let r, fill, strokeCol, strokeW;
    if (isActive) {
      r = 8; fill = 'var(--accent)'; strokeCol = 'var(--accent)'; strokeW = 0;
    } else if (status === 'complete') {
      r = 5.5; fill = '#3a9e6a'; strokeCol = '#4fbf85'; strokeW = 1;
    } else {
      r = 4.5; fill = 'var(--bg)'; strokeCol = 'var(--border2)'; strokeW = 1.5;
    }
    // Glow ring for active
    if (isActive) {
      nodeSvg += `<circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="13" fill="color-mix(in srgb, var(--accent) 15%, transparent)" stroke="none"/>`;
    }
    nodeSvg += `<circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="${r}" fill="${fill}" stroke="${strokeCol}" stroke-width="${strokeW}"><title>${n.label}</title></circle>`;
  });

  // Center ↺ glyph
  const centerGlyph = `<text x="50" y="54" text-anchor="middle" fill="var(--dim)" font-size="14" font-family="inherit" opacity="0.6" pointer-events="none">↺</text>`;

  svg.innerHTML = `
    ${arrMark}
    <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4 3"/>
    ${arcPaths}
    ${nodeSvg}
    ${centerGlyph}`;

  // Update stage name label
  if (nameEl) {
    const isNavStage = _NAV_STAGES.includes(activeId);
    nameEl.textContent = _NAV_STAGE_NAMES[activeId] || activeId;
    nameEl.style.color = isNavStage ? 'var(--accent)' : 'var(--fg2)';
    const subEl = nameEl.nextElementSibling;
    if (subEl) subEl.textContent = isNavStage ? 'active stage' : 'view cycle';
  }
}

function e10Go(id) {
  _expert = false;
  document.body.classList.remove('x');
  document.querySelectorAll('.e10-screen').forEach(screen => {
    screen.classList.toggle('active', screen.id === id);
  });
  // Highlight active pipeline step + update mini cycle
  document.querySelectorAll('.nav-step').forEach(btn => {
    const stepId = btn.id.replace('navstep-', '');
    btn.classList.toggle('active', stepId === id);
  });
  updateNavCycle(id);
  refreshNavCycleStatuses().then(() => updateNavCycle(id));
  _updateStageNavBar(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (id === 'setup')      e10LoadSetup();
  if (id === 'onboarding') e10LoadOnboarding();
  if (id === 'corpus')    { e10LoadDocumentScope(); renderScopeBannerInto('research-question-banner'); }
  if (id === 'lab')        { e10LoadLabParticipants(); renderScopeBannerInto('lab-scope-banner'); }
  if (id === 'architect') e10LoadArchitect();
  if (id === 'lineage')   e10LoadLineageExplorer();
  if (id === 'critic')    e10LoadCriticExplorer();
  if (id === 'review')    e10LoadReview();
  if (id === 'reader')    e10LoadReader();
  if (id === 'guide')          e10LoadGuide();
  if (id === 'constitution')   e10LoadConstitution();
}

async function e10LoadObservations(q = null) {
  const input = document.getElementById('q');
  const query = q == null ? (input?.value || '').trim() : q;
  const filter = document.getElementById('obs-filter')?.value || 'all';

  if (filter === 'bookmarked') {
    const bm = bmLoad();
    if (bm.size === 0) {
      renderResults(query, { count: 0, observations: [] });
      document.getElementById('qmeta').textContent = 'No bookmarked observations';
      return;
    }
    // Fetch all, client-side filter to bookmarked IDs
    const data = await get(`/api/e10/observations?q=${encodeURIComponent(query)}&filter=all&limit=5000`);
    const filtered = (data.observations || []).filter(o => bm.has(o.id));
    renderResults(query, { count: filtered.length, observations: filtered });
    return;
  }

  const data = await get(`/api/e10/observations?q=${encodeURIComponent(query)}&filter=${encodeURIComponent(filter)}&limit=60`);

  // For the motif/pattern panel, fetch the full result set separately so
  // distribution counts are accurate (display list stays capped at 60).
  if (query) {
    get(`/api/e10/observations?q=${encodeURIComponent(query)}&filter=${encodeURIComponent(filter)}&limit=5000`)
      .then(full => {
        const motifHost = document.getElementById('motif-panel');
        if (motifHost && (full.observations || []).length >= 2) {
          renderMotifPanel(query, full.observations, motifHost);
        }
      }).catch(() => {});
  }

  renderResults(query, data);
}

async function renderScopeBannerInto(hostId) {
  const host = document.getElementById(hostId);
  if (!host) return;
  try {
    const d = await get('/api/documents');
    const active = (d.documents || []).filter(doc => !doc.excluded);
    if (active.length === 0) { host.innerHTML = ''; return; }
    const roleLabels = { primary: 'primary', reference: 'reference', notes: 'notes', commentary: 'commentary', exploratory: 'exploratory' };
    const chips = active.map(doc => {
      const role = doc.source_role || 'primary';
      const name = doc.filename.replace(/\.pdf$/i, '');
      return `<span class="scope-doc-chip role-${role}" title="${role}">${name}</span>`;
    }).join('');
    const hasMixed = active.some(d => d.source_role && d.source_role !== 'primary');
    const modeLabel = hasMixed ? 'Comparative interpretation' : 'Single-corpus interpretation';
    host.innerHTML = `<div class="corpus-scope-banner">
      <span class="corpus-scope-banner-label">Scope:</span>${chips}
      <span style="margin-left:auto;font-size:11px;color:var(--dim2)">${modeLabel}</span>
    </div>`;
  } catch(e) { host.innerHTML = ''; }
}

    const d = await get('/api/documents');
    const docs = d.documents || [];
    if (docs.length <= 1 && !docs.some(d => d.excluded)) {
      host.innerHTML = '';
      return;
    }
    const roleLabels = { primary: 'Primary', reference: 'Reference', notes: 'Notes', commentary: 'Commentary', exploratory: 'Exploratory', excluded: 'Excluded' };
    const rows = docs.map(doc => {
      const active = !doc.excluded;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:${active ? 'var(--fg)' : 'var(--dim2)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x(doc.filename)}</div>
          <div style="font-size:11px;color:var(--dim2)">${doc.observation_count} obs · ${doc.total_pages}pp · ${roleLabels[doc.source_role] || doc.source_role}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <select onchange="docSetRole('${x(doc.id)}', this.value)"
            style="font-size:11px;padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg)">
            ${['primary','reference','notes','commentary','exploratory'].map(r =>
              `<option value="${r}"${doc.source_role===r?' selected':''}>${roleLabels[r]}</option>`
            ).join('')}
          </select>
          <button onclick="docToggleExclude('${x(doc.id)}', ${doc.excluded})"
            style="font-size:11px;padding:3px 10px;border-radius:var(--r);cursor:pointer;border:1px solid ${active ? 'var(--green)' : 'var(--red)'};color:${active ? 'var(--green)' : 'var(--red)'};background:none;white-space:nowrap">
            ${active ? '✓ In scope' : '✗ Excluded'}
          </button>
        </div>
      </div>`;
    }).join('');
    const excluded = docs.filter(d => d.excluded);
    const warn = excluded.length
      ? `<div style="font-size:12px;color:var(--yellow);margin-top:8px">⚠ ${excluded.length} document${excluded.length>1?'s are':' is'} excluded from analysis. Observations from ${excluded.length>1?'these documents':'it'} will not appear in search or be used in interpretations.</div>`
      : '';
    host.innerHTML = `<div style="border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;background:var(--bg2)">
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim2);font-weight:600;margin-bottom:10px">Analysis Scope — ${docs.filter(d=>!d.excluded).length} of ${docs.length} document${docs.length!==1?'s':''} active</div>
      ${rows}${warn}
    </div>`;
  } catch(e) {
    // Silently skip if documents endpoint unavailable
  }
}

async function docToggleExclude(docId, currentlyExcluded) {
  try {
    await fetch(`/api/documents/${encodeURIComponent(docId)}/scope`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ excluded: !currentlyExcluded }),
    });
    await e10LoadDocumentScope();
    await e10LoadObservations();
  } catch(e) { showAppError(e.message); }
}

async function docSetRole(docId, role) {
  try {
    await fetch(`/api/documents/${encodeURIComponent(docId)}/scope`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_role: role }),
    });
    await e10LoadDocumentScope();
  } catch(e) { showAppError(e.message); }
}

async function e10LoadReader() {
  const panel = document.getElementById('reader-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="e10-empty">Loading rendered narratives…</div>';
  try {
    const data = await get('/api/reader/narratives');
    renderReaderList(data, panel);
  } catch(e) {
    panel.innerHTML = `<div class="e10-empty" style="color:var(--red)">Error loading Reader View: ${x(e.message)}</div>`;
  }
}

function renderReaderList(data, panel) {
  if (!data.narratives || data.narratives.length === 0) {
    panel.innerHTML = '<div class="e10-empty">No rendered narratives yet. Run the Artist before opening Reader View.</div>';
    return;
  }
  const rows = data.narratives.map(n => {
    const report = n.validation_report;
    const score = report ? `${Math.round(report.semantic_fidelity)}%` : 'not audited';
    const verdict = report ? (report.approved ? 'approved' : 'not approved') : '—';
    const ts = n.created_at ? new Date(n.created_at).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'}) : '';
    const profileLabel = n.profile?.name || n.profile?.slug || 'Default';
    const providerLabel = n.provider || 'unknown';
    const ns = n.narrative_status || 'pending';
    const nsBadge = ns === 'accepted'
      ? `<span style="font-size:11px;color:var(--green);font-weight:600">✓ accepted</span>`
      : ns === 'rejected'
      ? `<span style="font-size:11px;color:var(--red)">✗ rejected</span>`
      : `<span style="font-size:11px;color:var(--dim2)">· pending</span>`;
    return `<div class="reader-card" onclick="e10LoadReaderDetail('${x(n.id)}')">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap">
        <div class="reader-title">${x(profileLabel)} · ${x(providerLabel)}</div>
        <div style="display:flex;gap:10px;align-items:baseline;flex-shrink:0">${nsBadge}<span style="font-size:11px;color:var(--dim2)">${ts}</span></div>
      </div>
      <div style="font-size:13px;color:var(--dim2);margin-top:2px;margin-bottom:4px">${x(n.blueprint?.title || 'Untitled')}</div>
      <div style="font-size:14px;color:var(--fg2);margin-top:4px">${x(n.blueprint?.thesis || '')}</div>
      <div class="reader-meta">
        <span>Critic: ${x(score)}</span>
        <span>${x(verdict)}</span>
        <span>${shortId(n.id)}</span>
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div style="margin-bottom:16px;color:var(--fg2);font-size:14px">
      ${data.count} rendered narrative${data.count !== 1 ? 's' : ''}
    </div>
    <div class="reader-list">${rows}</div>`;
}

async function e10LoadReaderDetail(narrativeId) {
  const panel = document.getElementById('reader-panel');
  panel.innerHTML = '<div class="e10-empty">Opening report…</div>';
  try {
    const detail = await get(`/api/reader/narratives/${encodeURIComponent(narrativeId)}`);
    renderReaderDetail(detail, panel);
  } catch(e) {
    panel.innerHTML = `<div class="e10-empty" style="color:var(--red)">Error opening report: ${x(e.message)}</div>`;
  }
}

function _renderProfileFidelityPanel(pf) {
  if (!pf) return '';
  const score = pf.profile_fidelity_score;
  const approved = pf.profile_approved;
  const checks = pf.checks || [];
  if (!checks.length && score === null) {
    return `<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
      <div class="reader-side-title">Profile Fidelity — ${x(pf.profile_name || pf.profile_slug)}</div>
      <div style="font-size:12px;color:var(--dim2)">${x(pf.note || 'No checks defined for this profile.')}</div>
    </div>`;
  }
  const scoreColor = approved ? 'var(--green)' : score >= 66 ? 'var(--accent)' : 'var(--red)';
  const scoreLabel = score !== null ? `${score}%` : '—';
  const verdictLabel = approved === true ? '✓ expression contract met' : approved === false ? '✗ expression issues found' : '—';
  const checkRows = checks.map(c => {
    const icon = c.passed ? '✓' : '✗';
    const color = c.passed ? 'var(--green)' : 'var(--red)';
    return `<div style="margin-bottom:8px">
      <div style="display:flex;gap:6px;align-items:baseline">
        <span style="color:${color};font-weight:700;flex-shrink:0">${icon}</span>
        <span style="font-size:12px;color:var(--fg)">${x(c.expectation)}</span>
      </div>
      ${c.evidence ? `<div style="font-size:11px;color:var(--dim2);margin-left:16px;margin-top:2px">${x(c.evidence)}</div>` : ''}
    </div>`;
  }).join('');
  return `<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
    <div class="reader-side-title">Profile Fidelity — ${x(pf.profile_name || pf.profile_slug)}</div>
    <div style="font-size:13px;margin-bottom:10px">
      <span style="color:${scoreColor};font-weight:600">${scoreLabel}</span>
      <span style="color:var(--dim2);margin-left:6px;font-size:12px">${verdictLabel}</span>
    </div>
    ${checkRows}
  </div>`;
}

function renderReaderDetail(d, panel) {
  const narrative = d.rendered_narrative || {};
  const profile = d.profile || {};
  const blueprint = d.blueprint || {};
  const report = d.validation_report;
  const score = report ? `${Math.round(report.semantic_fidelity)}%` : 'not audited';
  const verdict = report ? (report.approved ? 'approved' : 'not approved') : 'pending';
  const contract = d.surfaces?.semantic_contract;
  const nid = x(narrative.id || '');
  const currentStatus = narrative.narrative_status || 'pending';
  const currentRationale = narrative.narrative_rationale || '';

  const statusColor = { accepted: 'var(--green)', rejected: 'var(--red)', pending: 'var(--dim2)' };
  const statusLabel = { accepted: '✓ Accepted for synthesis', rejected: '✗ Rejected', pending: '· Pending steward decision' };

  panel.innerHTML = `
    <button class="reader-action" onclick="e10LoadReader()" style="width:auto;padding:0 12px;margin:0 0 18px">← All Reports</button>
    <div class="reader-layout">
      <article class="reader-report">
        <div style="font-size:12px;color:var(--dim2);font-family:var(--mono);margin-bottom:10px">Read Report</div>
        <h1 style="font-size:28px;line-height:1.18;margin-bottom:8px;color:var(--fg);letter-spacing:0">${x(blueprint.title || 'Untitled Report')}</h1>
        <div style="font-size:15px;color:var(--accent);font-style:italic;margin-bottom:24px">${x(blueprint.thesis || '')}</div>
        <div class="reader-report-text" id="reader-report-text">${x(narrative.text || '')}</div>
      </article>
      <aside class="reader-side">
        <div class="reader-side-title">Report Metadata</div>
        <div class="provider-kv" style="grid-template-columns:86px 1fr">
          <div class="provider-k">Profile</div><div class="provider-v">${x(profile.name || profile.slug || '—')}</div>
          <div class="provider-k">Provider</div><div class="provider-v">${x(narrative.provider || '—')}</div>
          <div class="provider-k">Critic</div><div class="provider-v">${x(score)} · ${x(verdict)}</div>
          <div class="provider-k">Narrative</div><div class="provider-v">${shortId(narrative.id || '')}</div>
        </div>

        <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
          <div class="reader-side-title">Narrative Stewardship</div>
          <div id="narrative-status-label" style="font-size:13px;color:${statusColor[currentStatus]};margin-bottom:10px">${statusLabel[currentStatus]}</div>
          <textarea id="narrative-rationale-input" rows="3"
            placeholder="Rationale required — why accept or reject this report?"
            style="width:100%;box-sizing:border-box;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:13px;font-family:var(--sans);resize:vertical;margin-bottom:8px"
          >${x(currentRationale)}</textarea>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="reader-action" style="color:var(--green);border-color:var(--green);flex:1"
              onclick="narrativeSteward('${nid}','accepted')">Accept →</button>
            <button class="reader-action" style="color:var(--red);border-color:var(--red);flex:1"
              onclick="narrativeSteward('${nid}','rejected')">Reject</button>
          </div>
          <div id="narrative-steward-msg" style="font-size:12px;color:var(--dim2);margin-top:6px"></div>
        </div>

        ${_renderProfileFidelityPanel(report?.profile_fidelity)}

        <button class="reader-action" onclick="copyReaderText()" style="margin-top:12px">Copy Text</button>
        ${contract ? `<button class="reader-action" onclick="window.open('${x(contract)}','_blank')">Contract Audit</button>` : ''}
        <button class="reader-action" onclick="e10OpenReaderLineage('${nid}')">Lineage</button>
        <button class="reader-action" onclick="e10Go('critic')">Critic</button>
      </aside>
    </div>`;
}

async function narrativeSteward(narrativeId, status) {
  const rationale = document.getElementById('narrative-rationale-input')?.value?.trim();
  const msg = document.getElementById('narrative-steward-msg');
  if (!rationale) { msg.textContent = 'Rationale required.'; msg.style.color = 'var(--red)'; return; }
  msg.textContent = 'Saving…'; msg.style.color = 'var(--dim2)';
  try {
    const res = await fetch(`/api/reader/narratives/${encodeURIComponent(narrativeId)}/steward`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, rationale }),
    });
    const d = await res.json();
    if (!res.ok) { msg.textContent = d.error || 'Error'; msg.style.color = 'var(--red)'; return; }
    const colors = { accepted: 'var(--green)', rejected: 'var(--red)' };
    const labels = { accepted: '✓ Accepted for synthesis', rejected: '✗ Rejected' };
    document.getElementById('narrative-status-label').textContent = labels[status];
    document.getElementById('narrative-status-label').style.color = colors[status];
    msg.textContent = 'Saved.'; msg.style.color = 'var(--green)';
  } catch(e) {
    msg.textContent = e.message; msg.style.color = 'var(--red)';
  }
}

async function copyReaderText() {
  const text = document.getElementById('reader-report-text')?.textContent || '';
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    showAppError('Copy failed. Select the report text manually.');
  }
}

async function e10OpenReaderLineage(narrativeId) {
  e10Go('lineage');
  await e10LoadLineageGraph(narrativeId);
}

function e10ManageKey(participant) {
  const provider = (_e10Providers || []).find(p => p.participant === participant);
  const host = document.getElementById(`key-panel-${participant}`);
  if (!provider || !host) return;
  const envName = provider.credential_source;
  const supported = !!envName;
  host.innerHTML = `<div class="provider-key-panel">
    <div class="provider-key-title">${provider.configured ? 'Manage Key' : 'Add Key'} — ${x(provider.label)}</div>
    <div class="provider-note">
      ${supported
        ? 'Keys entered here are held only in server memory. They are not stored in the browser, localStorage, sessionStorage, or the .herm database, and are forgotten when the server stops.'
        : 'No key target is registered for this participant yet. A provider adapter must be added before keys can be managed.'}
    </div>
    ${supported ? `<div class="provider-kv">
      <div class="provider-k">Env Var</div><div class="provider-v">${x(envName)}</div>
      <div class="provider-k">Present</div><div class="provider-v">${provider.configured ? 'yes' : 'no'}</div>
      <div class="provider-k">Persistence</div><div class="provider-v">current server session only</div>
    </div>
    <input class="provider-key-input" id="key-input-${x(participant)}" type="password" autocomplete="off" placeholder="Enter API key">
    <div class="e10-actions">
      <button class="btn-trace" onclick="e10SaveKey('${x(participant)}')">Save Key</button>
      ${provider.credential_scope === 'server_session' ? `<button class="btn-trace" onclick="e10RemoveKey('${x(participant)}')">Remove Key</button>` : ''}
    </div>` : ''}
  </div>`;
}

async function e10SaveKey(participant) {
  const input = document.getElementById(`key-input-${participant}`);
  const apiKey = input?.value.trim() || '';
  if (!apiKey) {
    showAppError('Enter an API key before saving.');
    input?.focus();
    return;
  }
  const result = await put(`/api/e10/providers/${encodeURIComponent(participant)}/key`, {
    api_key: apiKey,
  });
  input.value = '';
  _e10ProviderNotices[participant] = result.message;
  await e10LoadProviders();
}

async function e10RemoveKey(participant) {
  const result = await del(`/api/e10/providers/${encodeURIComponent(participant)}/key`);
  _e10ProviderNotices[participant] = result.message;
  await e10LoadProviders();
}

async function e10TestProvider(participant) {
  const result = await post(`/api/e10/providers/${encodeURIComponent(participant)}/test`, {});
  _e10ProviderNotices[participant] = result.configuration_valid
    ? `Configuration valid. ${result.message}`
    : result.message;
  await e10LoadProviders();
}

async function e10SelectObservation(id) {
  _e10Selected = id;
  _e10Detail = await get(`/api/e10/observations/${encodeURIComponent(id)}`);
  _e10ActiveProposal = (_e10Detail.proposals || []).find(p => p.status === 'pending') || null;
  e10RenderSelected();
  e10RenderReview();
  e10RenderCritic();
  await e10LoadObservations();
  e10Go('lab');
}

function e10RenderSelected() {
  const host = document.getElementById('selected-observation');
  if (!_e10Detail) {
    host.className = 'e10-empty';
    host.textContent = 'Select an observation from the corpus.';
    return;
  }
  const o = _e10Detail.observation;
  host.className = 'e10-card';
  host.innerHTML = `
    <div class="e10-meta">OBS-${o.obs_index} · ${x(o.source_locator || '')}</div>
    <div class="e10-text">"${x(o.raw_text)}"</div>
    <div class="e10-badges">
      <span class="e10-badge">Observation</span>
      <span class="e10-badge">SourceExtraction ${shortId(o.source_extraction_id)}</span>
      <span class="e10-badge">Document ${shortId(o.source_document_id)}</span>
    </div>`;
}

async function e10GenerateInterpretations() {
  if (!_e10Selected) return;
  const participants = [...document.querySelectorAll('.e10-check-input:checked')].map(i => i.value);
  const host = document.getElementById('lab-results');
  host.innerHTML = '<div class="e10-empty">Generating proposals...</div>';
  const data = await post('/api/e10/interpretations/generate', {
    observation_id: _e10Selected,
    participants,
  });
  host.innerHTML = data.proposals.map(e10ProposalCard).join('');
  _e10Detail = await get(`/api/e10/observations/${encodeURIComponent(_e10Selected)}`);
  _e10ActiveProposal = data.proposals[0] || null;
  e10RenderReview();
  e10RenderCritic();
  e10Go('review');
}

function e10RenderReview() {
  const host = document.getElementById('review-panel');
  if (!_e10Detail) {
    host.className = 'e10-empty';
    host.style.display = 'none';
    host.textContent = 'Generated proposals will appear here.';
    return;
  }
  host.style.display = '';
  const o = _e10Detail.observation;
  const proposals = _e10Detail.proposals || [];
  host.className = '';
  host.innerHTML = `
    <div class="e10-card">
      <div class="e10-meta">Observation</div>
      <div class="e10-text">"${x(o.raw_text)}"</div>
    </div>
    <div class="e10-stack">
      ${proposals.length ? proposals.map(e10ReviewCard).join('') : '<div class="e10-empty">No proposals yet.</div>'}
      ${(_e10Detail.interpretations || []).length ? `<div class="e10-card"><div class="e10-meta">Accepted canonical interpretations</div>${_e10Detail.interpretations.map(i => `<div class="e10-claim"><strong>${x(i.perspective)}</strong><br>${x(i.text)}</div>`).join('')}</div>` : ''}
    </div>`;
}

function e10ProposalCard(p) {
  return `<div class="e10-card">
    <div class="e10-meta">${x(p.perspective)} · ${x(p.status)}</div>
    <div class="e10-text">${x(p.text)}</div>
  </div>`;
}

function e10ReviewCard(p) {
  const terminal = p.status !== 'pending';
  return `<div class="e10-card">
    <div class="e10-meta">${x(p.perspective)} · ${x(p.status)} · ${shortId(p.id)}</div>
    <div class="e10-text">${x(p.text)}</div>
    <textarea class="e10-comment" id="comment-${x(p.id)}" placeholder="Steward comment">${x(p.steward_rationale || '')}</textarea>
    <div class="e10-actions">
      <button class="btn-trace" onclick="e10ChooseProposal('${x(p.id)}')">Select for Critic</button>
      <button class="btn-trace" ${terminal ? 'disabled' : ''} onclick="e10Accept('${x(p.id)}')">Accept / Promote</button>
      <button class="btn-trace" ${terminal ? 'disabled' : ''} onclick="e10Reject('${x(p.id)}')">Reject</button>
      <button class="btn-trace" onclick="e10InterpretationLineage('${x(p.id)}')">Lineage</button>
    </div>
  </div>`;
}

async function e10Accept(id) {
  const comment = document.getElementById(`comment-${id}`)?.value || '';
  await post(`/api/e10/proposals/${encodeURIComponent(id)}/accept`, { comment });
  _e10Detail = await get(`/api/e10/observations/${encodeURIComponent(_e10Selected)}`);
  e10RenderReview();
}

async function e10Reject(id) {
  const comment = document.getElementById(`comment-${id}`)?.value || '';
  await post(`/api/e10/proposals/${encodeURIComponent(id)}/reject`, { comment });
  _e10Detail = await get(`/api/e10/observations/${encodeURIComponent(_e10Selected)}`);
  e10RenderReview();
}

function e10ChooseProposal(id) {
  _e10ActiveProposal = (_e10Detail?.proposals || []).find(p => p.id === id) || null;
  e10RenderCritic();
  e10Go('critic');
}

function e10RenderCritic() {
  const host = document.getElementById('critic-panel');
  if (!_e10ActiveProposal) {
    host.className = 'e10-empty';
    host.textContent = 'Select a proposed interpretation to run the Critic.';
    return;
  }
  host.className = '';
  host.innerHTML = `<div class="e10-card">
    <div class="e10-meta">Selected interpretation · ${x(_e10ActiveProposal.perspective)}</div>
    <div class="e10-text">${x(_e10ActiveProposal.text)}</div>
    <div class="e10-actions">
      <button class="btn-trace" onclick="e10RunCritic()">Run Critic</button>
    </div>
  </div>
  <div class="e10-policy-grid" id="critic-results">
    ${(_e10ActiveProposal.critic_reports || []).map(e10CriticReport).join('')}
  </div>`;
}

async function e10RunCritic() {
  if (!_e10ActiveProposal) return;
  const policies = ['aggregate_weighting', 'decomposition', 'contradiction_sensitive', 'conservative'];
  const data = await post('/api/e10/critic/run', {
    proposal_id: _e10ActiveProposal.id,
    policies,
  });
  _e10ActiveProposal.critic_reports = data.reports;
  document.getElementById('critic-results').innerHTML = data.reports.map(e10CriticReport).join('');
}

function e10CriticReport(r) {
  return `<div class="e10-card">
    <div class="e10-meta">${x(r.policy)} · ${x(r.overall_verdict)}</div>
    <div class="e10-badges">${(r.evidence_passages || []).map(e => `<span class="e10-badge">Evidence: ${truncate(x(e), 90)}</span>`).join('')}</div>
    ${(r.claims || []).map(c => `<div class="e10-claim"><strong>${x(c.verdict || '')}</strong><br>${x(c.claim || '')}<br><span style="color:var(--dim2)">${x(c.rationale || '')}</span></div>`).join('')}
  </div>`;
}

async function e10LoadFindings() {
  const host = document.getElementById('finding-panel');
  const data = await get('/api/e10/findings');
  host.className = '';
  host.innerHTML = data.findings.length
    ? `<div class="e10-stack">${data.findings.map(f => `<div class="e10-card">
        <div class="e10-meta">${x(f.dimension)} · ${x(f.status)} · ${shortId(f.id)}</div>
        <div class="e10-text">${x(f.operation || '')}</div>
        <button class="btn-trace" onclick="e10FindingLineage('${x(f.id)}')">Show Lineage</button>
      </div>`).join('')}</div>`
    : '<div class="e10-empty">No canonical Findings are present yet. Critic reports above are operational E9 artifacts; canonical Finding lineage appears here when Findings exist.</div>';
}

async function e10FindingLineage(id) {
  const data = await get(`/api/e10/findings/${encodeURIComponent(id)}/lineage`);
  const host = document.getElementById('finding-panel');
  host.style.display = 'block';
  const nodes = data.lineage?.nodes || [];
  host.innerHTML = `<div class="e10-card">
    <div class="e10-meta">Finding · ${shortId(data.finding.id)}</div>
    <div class="e10-text">${x(data.finding.dimension)} / ${x(data.finding.status)}</div>
    <div class="e10-lineage">
      ${e10LineageRow('Finding', data.finding.id, data.finding.operation)}
      <div class="e10-lineage-arrow">↓</div>
      ${nodes.map((n, i) => `${i ? '<div class="e10-lineage-arrow">↓</div>' : ''}${e10LineageRow(n.class, n.id, e10NodeSummary(n))}`).join('')}
    </div>
  </div>`;
}

async function e10InterpretationLineage(proposalId) {
  if (!_e10Detail) return;
  const proposal = (_e10Detail.proposals || []).find(p => p.id === proposalId);
  const fp = document.getElementById('finding-panel');
  if (!proposal || proposal.status !== 'accepted') {
    fp.style.display = 'block';
    fp.innerHTML = '<div class="e10-empty">Lineage for a proposal becomes canonical after Accept / Promote.</div>';
    e10Go('lineage');
    return;
  }
  const interp = (_e10Detail.interpretations || []).find(i => i.ai_provenance_id === proposal.ai_provenance_id);
  if (!interp) return;
  const graph = await get(`/api/lineage/interpretation/${encodeURIComponent(interp.id)}`);
  fp.style.display = 'block';
  fp.innerHTML = `<div class="e10-card">
    <div class="e10-meta">Canonical interpretation lineage</div>
    <div class="e10-lineage">${graph.nodes.map((n, i) => `${i ? '<div class="e10-lineage-arrow">↓</div>' : ''}${e10LineageRow(n.class, n.id, e10NodeSummary(n))}`).join('')}</div>
  </div>`;
  e10Go('lineage');
}

function e10LineageRow(cls, id, summary) {
  return `<div class="e10-lineage-row"><div class="e10-meta">${x(cls)} · ${shortId(id)}</div><div class="e10-text">${x(summary || '')}</div></div>`;
}

function e10NodeSummary(node) {
  const d = node.data || {};
  return d.text || d.raw_text || d.title || d.original_filename || d.source_locator || '';
}

// ── Utilities ──────────────────────────────────────────
function get(url) {
  return requestJSON(url);
}
function post(url, body) {
  return requestJSON(url, {
    method: 'POST',
    body,
  });
}
function put(url, body) {
  return requestJSON(url, { method: 'PUT', body });
}
function del(url) {
  return requestJSON(url, { method: 'DELETE' });
}
async function requestJSON(url, options = {}) {
  const requestOptions = { ...options };
  if (requestOptions.body !== undefined) {
    requestOptions.headers = { 'Content-Type': 'application/json', ...(requestOptions.headers || {}) };
    requestOptions.body = JSON.stringify(requestOptions.body || {});
  }
  try {
    const response = await fetch(url, requestOptions);
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
    clearAppError();
    return data;
  } catch (error) {
    showAppError(
      error instanceof TypeError
        ? 'Hermeneia server is unavailable. Restart the local server and reload this page.'
        : error.message
    );
    throw error;
  }
}
function showAppError(message) {
  const host = document.getElementById('app-error');
  if (!host) return;
  host.textContent = message;
  host.classList.add('open');
}
function showAppMessage(message) {
  const host = document.getElementById('app-error');
  if (!host) return;
  host.textContent = message;
  host.style.color = 'var(--green)';
  host.style.borderColor = 'var(--green)';
  host.style.background = 'rgba(78,201,78,.08)';
  host.classList.add('open');
}
function clearAppError() {
  const host = document.getElementById('app-error');
  if (!host) return;
  host.classList.remove('open');
  host.removeAttribute('style');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function el(tag, cls, html) {
  const d = document.createElement(tag);
  d.className = cls; d.innerHTML = html; return d;
}
function fmt(n)  { return n == null ? '—' : Number(n).toLocaleString(); }
function shortId(id) {
  const s = String(id ?? '');
  return s.length > 20 ? `${s.slice(0,16)}…${s.slice(-6)}` : s;
}
function formatLineageValue(v) {
  if (Array.isArray(v)) return v.map(item => typeof item === 'object' && item !== null ? JSON.stringify(item) : String(item ?? '')).join(', ');
  if (typeof v === 'object' && v !== null) return JSON.stringify(v);
  const s = String(v ?? '');
  return s.length > 220 ? `${s.slice(0,220)}…` : s;
}
function truncate(s, n) {
  let v=0, i=0;
  while (i < s.length && v < n) {
    if (s[i] === '<') { while (i < s.length && s[i] !== '>') i++; } else v++;
    i++;
  }
  return i >= s.length ? s : s.slice(0, i) + '…';
}
function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function x(s)   {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function e10LoadReview() {
  const host = document.getElementById('review-canon-panel');
  if (!host) return;
  host.innerHTML = '<div class="e10-empty" style="padding:24px">Loading…</div>';

  const resp = await fetch('/api/review/interpretations');
  if (!resp.ok) { host.innerHTML = '<div class="e10-empty">Failed to load.</div>'; return; }

  const interps = data.interpretations || [];

  if (!interps.length) {
    host.innerHTML = `<div class="e10-empty">No interpretations yet.<br>
      <span style="font-size:12px;color:var(--dim2)">Run: python3 scripts/herm bootstrap</span></div>`;
    return;
  }

  // Group by evidential_status
  const groups = { established: [], speculative: [], rejected: [], pending: [] };
  for (const i of interps) {
    const k = groups[i.evidential_status] ? i.evidential_status : 'pending';
    groups[k].push(i);
  }

  const statusMeta = {
    established: { label: 'Accepted', color: 'var(--green)',  icon: '✓' },
    speculative:  { label: 'Speculative', color: 'var(--yellow)', icon: '◎' },
    rejected:     { label: 'Rejected',  color: 'var(--red)',   icon: '✗' },
    pending:      { label: 'Pending',   color: 'var(--dim2)',  icon: '○' },
  };

  const renderCard = (i) => {
    const m = statusMeta[i.evidential_status] || statusMeta.pending;
    const eid = `si-${x(i.id)}`;
    return `
      <div id="card-${eid}" style="border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:8px;background:var(--surface)">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <span id="icon-${eid}" style="color:${m.color};font-size:16px;margin-top:1px;flex-shrink:0">${m.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;color:var(--dim2);margin-bottom:4px;font-family:var(--mono)">
              ${x(i.perspective)} · p.${i.obs_page}
              <span id="badge-${eid}" style="margin-left:6px;padding:1px 6px;border-radius:3px;font-size:10px;background:var(--surface2);color:${m.color}">${m.label}</span>
              <span style="margin-left:8px;color:var(--dim2);font-size:10px">${i.created_at ? new Date(i.created_at).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'}) : ''}</span>
              <span style="margin-left:6px;color:var(--dim2);font-size:10px">${x(i.source || '')}</span>
            </div>
            <div style="font-size:13px;color:var(--fg2);line-height:1.5;margin-bottom:8px">${x(i.text)}</div>
            <details style="font-size:12px;color:var(--dim2);margin-bottom:10px">
              <summary style="cursor:pointer;list-style:none;color:var(--dim2)">Source observation ↓</summary>
              <div style="margin-top:6px;padding:8px;background:var(--bg);border-radius:4px;font-style:italic;line-height:1.5">"${x((i.obs_text||'').slice(0,220))}…"</div>
            </details>
            <textarea id="note-${eid}" placeholder="Steward note (optional)"
              style="width:100%;box-sizing:border-box;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg2);resize:vertical;min-height:52px;margin-bottom:8px;font-family:inherit">${x(i.steward_note || '')}</textarea>

              <button onclick="stewardAct('${x(i.id)}','uncertain')"  style="padding:5px 11px;font-size:12px;border-radius:4px;cursor:pointer;background:var(--surface2);border:1px solid var(--red,#e57373);color:var(--red,#e57373)">✗ Mark Uncertain</button>
              <span id="status-${eid}" style="font-size:11px;color:var(--dim2);margin-left:4px"></span>
            </div>

        <div style="font-size:11px;letter-spacing:.08em;color:${m.color};margin-bottom:10px;font-weight:600">

      <div style="font-size:12px;color:var(--dim2);margin-bottom:12px;letter-spacing:.05em">PIPELINE ACTIONS</div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;color:var(--dim2);margin-bottom:6px;letter-spacing:.06em">PROVIDERS</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap">${providerCheckboxes}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;color:var(--dim2);margin-bottom:6px;letter-spacing:.06em">PROFILES — hover to preview</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${profileCheckboxes}</div>
        <div class="profile-preview-panel" id="profile-preview-panel"></div>

          style="background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:8px 16px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600">
          ▶ Run Artist
        </button>
        <button id="run-critic-btn" onclick="runCriticFromReview()" ${narrativeCount === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}
          style="background:var(--surface);border:1px solid var(--border);color:var(--fg2);padding:8px 16px;border-radius:5px;cursor:pointer;font-size:13px">
          ◈ Run Critic
        </button>

          ⬡ View Lineage
        </button>

          style="background:var(--surface);border:1px solid var(--border);color:var(--fg2);padding:8px 16px;border-radius:5px;cursor:pointer;font-size:13px">

      <div id="pipeline-action-status" style="font-size:12px;color:var(--dim2);margin-top:4px;min-height:18px"></div>
    </div>`;

  host.innerHTML = actionBar +
    renderGroup('established') +
    renderGroup('speculative') +
    renderGroup('pending') +
    renderGroup('rejected');

async function stewardAct(interpId, newStatus) {
  const eid = `si-${interpId}`;
  const noteEl = document.getElementById(`note-${eid}`);
  const badgeEl = document.getElementById(`badge-${eid}`);
  const statusEl = document.getElementById(`status-${eid}`);

  // Read previous status from the badge text so we can log it
  const prevStatus = (badgeEl?.textContent || '').trim().toLowerCase();
  const userNote = noteEl?.value || '';

  // Build append-only audit entry
  const ts = new Date().toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
  const auditLine = `[${ts}] ${prevStatus} → ${newStatus}${userNote ? ': ' + userNote : ''}`;

  // Fetch current note from server so we don't lose existing history
  let existingNote = '';
  try {
    const cur = await fetch(`/api/review/interpretations/${encodeURIComponent(interpId)}`).then(r => r.json());
    existingNote = cur.steward_note || '';
  } catch (_) {}

  const combinedNote = existingNote ? existingNote + '\n' + auditLine : auditLine;
  if (noteEl) noteEl.value = combinedNote;

  if (statusEl) statusEl.textContent = 'Saving…';
  try {
    const resp = await fetch(`/api/review/interpretations/${encodeURIComponent(interpId)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ evidential_status: newStatus, steward_note: combinedNote }),
    });
    if (!resp.ok) throw new Error((await resp.json()).error || 'Request failed');
    const data = await resp.json();
    const statusMeta = {
      established: { label: 'Accepted',    color: 'var(--green,#4caf50)',  icon: '✓' },
      speculative:  { label: 'Speculative', color: 'var(--yellow,#f4c542)', icon: '◎' },
      contested:    { label: 'Contested',   color: 'var(--yellow,#f4c542)', icon: '◎' },
      uncertain:    { label: 'Uncertain',   color: 'var(--red,#e57373)',    icon: '✗' },
      pending:      { label: 'Pending',     color: 'var(--dim2)',           icon: '○' },
    };
    const m = statusMeta[data.evidential_status] || statusMeta.pending;
    const iconEl = document.getElementById(`icon-${eid}`);
    const badgeEl = document.getElementById(`badge-${eid}`);
    if (iconEl) { iconEl.textContent = m.icon; iconEl.style.color = m.color; }
    if (badgeEl) { badgeEl.textContent = m.label; badgeEl.style.color = m.color; }
    if (statusEl) { statusEl.textContent = '✓ Saved'; setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000); }
  } catch (e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)">✗ ${x(e.message)}</span>`;
  }
}

function showProfilePreview(slug) {
  const panel = document.getElementById('profile-preview-panel');
  const meta = window._profileMeta?.[slug];
  if (!panel || !meta) return;
  const metaLine = [meta.audience, meta.tone].filter(Boolean).join(' · ');
  panel.innerHTML = `
    <div class="profile-preview-name">${x(meta.name)}</div>
    ${metaLine ? `<div class="profile-preview-meta">${x(metaLine)}</div>` : ''}
    <div>${x(meta.description)}</div>`;
  panel.classList.add('visible');
}
function hideProfilePreview() {
  const panel = document.getElementById('profile-preview-panel');
  if (panel) panel.classList.remove('visible');
}

async function runArtistFromReview() {
  const btn     = document.getElementById('run-artist-btn');
  const status  = document.getElementById('pipeline-action-status');
  const profile = document.getElementById('action-profile')?.value || 'literary-en';
  if (!btn || !status) return;

  const providers = [...document.querySelectorAll('.action-provider-cb:checked')].map(cb => cb.value);
  const profiles  = [...document.querySelectorAll('.action-profile-cb:checked')].map(cb => cb.value);
  if (!providers.length) { status.innerHTML = `<span style="color:var(--red)">✗ Select at least one provider.</span>`; return; }
  if (!profiles.length)  { status.innerHTML = `<span style="color:var(--red)">✗ Select at least one profile.</span>`;  return; }

  // Build cartesian product
  const runs = [];
  for (const prov of providers) for (const prof of profiles) runs.push({ prov, prof });

  btn.disabled = true;
  btn.textContent = '▶ Running…';

  const results = [];
  for (const { prov, prof } of runs) {
    const isOllama = prov.startsWith('ollama');
    status.innerHTML = `Running <strong>${prov}</strong> · <strong>${prof}</strong>… (${results.length + 1}/${runs.length})`;
    try {
      const activePlanId = getActivePlanId();
      const body = activePlanId
        ? { plan_id: activePlanId, provider: prov, profile: prof }
        : { obs_ref: 'OBS-19', provider: prov, profile: prof };
      const resp = await fetch('/api/pipeline/run-artist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!resp.ok) {
        const msg = data.error || 'Unknown error';
        const errType = data.error_type || '';
        const hint = isOllama ? ' (Ollama not running?)' : /connection|api.?key|auth|credential|invalid/i.test(msg) ? ' (check API key in Expert)' : '';
        results.push({ prov, prof, ok: false, msg: (errType ? `[${errType}] ` : '') + msg + hint });
      } else {
        results.push({ prov, prof, ok: true, id: data.id });
        const criticBtn = document.getElementById('run-critic-btn');
        if (criticBtn) { criticBtn.removeAttribute('disabled'); criticBtn.style.opacity='1'; criticBtn.dataset.narrativeId = data.id; }
      }
    } catch (e) {
      results.push({ prov, prof, ok: false, msg: e.message });
    }
  }

  const summary = results.map(r =>
    r.ok
      ? `<span style="color:var(--green)">✓ ${r.prov} · ${r.prof}</span>`
      : `<span style="color:var(--red)">✗ ${r.prov} · ${r.prof}: ${x(r.msg)}</span>`
  ).join('<span style="color:var(--dim2)">  </span>');

  const lastOk = results.filter(r => r.ok).pop();
  status.innerHTML = summary + (lastOk
    ? ` <button onclick="e10Go('reader')" style="margin-left:10px;background:var(--accent2);border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">Read Report →</button>
        <button onclick="e10Go('lineage')" style="margin-left:6px;background:none;border:1px solid var(--border);color:var(--fg2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px">View Lineage</button>`
    : '');

  btn.disabled = false;
  btn.textContent = '▶ Run Artist';
}

async function runCriticFromReview() {
  const btn = document.getElementById('run-critic-btn');
  const status = document.getElementById('pipeline-action-status');
  if (!btn || !status) return;

  const narrativeId = btn.dataset.narrativeId || null;
  btn.disabled = true;
  btn.textContent = '◈ Evaluating…';
  status.textContent = 'Running semantic fidelity check…';

  try {
    const body = narrativeId
      ? { narrative_id: narrativeId }
      : { obs_ref: 'OBS-19' };
    const resp = await fetch('/api/pipeline/run-critic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Unknown error');
    const r = data.report || {};
    const fid = r.semantic_fidelity != null ? `${Math.round(r.semantic_fidelity)}%` : '—';
    status.innerHTML = `<span style="color:var(--green)">✓ Critic report stored — Fidelity: ${fid}</span>
      <button onclick="e10Go('critic')" style="margin-left:10px;background:none;border:1px solid var(--accent);color:var(--accent);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px">View →</button>`;
  } catch (e) {

function _lineageExplorerRenderGraph(graph, host) {
  const mode = _expert ? 'expert' : 'universal';
  const byClass = new Map();
  for (const node of graph.nodes || []) {
    if (!byClass.has(node.class)) byClass.set(node.class, []);
    byClass.get(node.class).push(node);
  }
  const groups = LINEAGE_ORDER.filter(cls => byClass.has(cls)).map(cls => ({
    cls, nodes: byClass.get(cls),
  }));

  const chainRows = groups.map((group, gi) => {
    const meta = (LINEAGE_VOCAB[mode] || LINEAGE_VOCAB.universal)[group.cls]
              || { icon: '◈', title: group.cls, subtitle: '' };
    const nodeButtons = group.nodes.map(node => {
      const key = `${node.class}:${node.id}`;
      const summary = node.data?.text || node.data?.raw_text || node.data?.title || node.data?.original_filename || '';
      return `<button class="lineage-chain-node" data-node-key="${x(key)}"
          onclick="_lineageExplorerSelectNode('${x(key)}')"
          style="width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);
                 border-radius:var(--r);padding:8px 12px;cursor:pointer;margin-top:4px;
                 transition:border-color 0.15s,background 0.15s,opacity 0.15s">
          <div style="font-size:12px;color:var(--accent);font-family:var(--mono)">${meta.icon} ${x(meta.title)}</div>
          ${summary ? `<div style="font-size:11px;color:var(--fg2);margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${x(summary.slice(0,72))}</div>` : ''}
          <div style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:2px">${x(shortId(node.id))}</div>
        </button>`;
    }).join('');

    return `
      ${gi > 0 ? '<div style="text-align:center;color:var(--dim);padding:6px 0;font-size:14px">↓</div>' : ''}
      ${nodeButtons}`;
  }).join('');

  const backBtn = `<button onclick="e10LoadLineageExplorer()"
    style="margin-bottom:20px;background:none;border:1px solid var(--border);color:var(--fg2);
           padding:4px 12px;border-radius:var(--r);cursor:pointer;font-size:13px">
    ← All Narratives</button>`;

  host.innerHTML = `
    ${backBtn}
    <div style="display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start">
      <div id="lineage-chain-col" style="position:sticky;top:72px">
        <div style="font-size:11px;color:var(--dim2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">Provenance Chain</div>
        ${chainRows}
      </div>
      <div id="lineage-detail-col">
        <div style="color:var(--dim2);font-size:13px;padding:32px 0;text-align:center">
          Click any node to see its details and upstream dependencies
        </div>
      </div>
    </div>`;
}

function _lineageExplorerSelectNode(key) {
  // Compute upstream set — everything the selected node depends on
  const upstream = _lineageUpstreamKeys(_lineageExplorerGraph, key);

  // Style all chain buttons
  document.querySelectorAll('.lineage-chain-node').forEach(btn => {
    const nk = btn.dataset.nodeKey;
    const isSelected = nk === key;
    const isUpstream = upstream.has(nk) && !isSelected;
    btn.style.borderColor = isSelected ? 'var(--accent)'
                          : isUpstream ? 'rgba(95,207,212,0.4)' : 'var(--border)';
    btn.style.background  = isSelected ? 'rgba(95,207,212,0.15)'
                          : isUpstream ? 'rgba(95,207,212,0.05)' : 'var(--surface)';
    btn.style.opacity     = (isSelected || isUpstream) ? '1' : '0.35';
  });

  // Resolve node object
  const colonIdx = key.indexOf(':');
  const cls    = key.slice(0, colonIdx);
  const nodeId = key.slice(colonIdx + 1);
  const node   = (_lineageExplorerGraph?.nodes || []).find(n => n.class === cls && n.id === nodeId);
  const panel  = document.getElementById('lineage-detail-col');
  if (!panel || !node) return;

  const mode = _expert ? 'expert' : 'universal';
  const meta = (LINEAGE_VOCAB[mode] || LINEAGE_VOCAB.universal)[node.class]
             || { icon: '◈', title: node.class, subtitle: '' };
  const data = node.data || {};

  // Key-value rows (skip blank values, cap at 12)
  const kvRows = [['id', node.id], ...Object.entries(data).filter(([, v]) => v !== null && v !== undefined && v !== '')]
    .slice(0, 12)
    .map(([k, v]) => `
      <div style="display:grid;grid-template-columns:140px 1fr;gap:8px;padding:6px 0;
                  border-bottom:1px solid var(--border);font-size:13px">
        <div style="color:var(--dim2);font-family:var(--mono);font-size:11px">${x(k)}</div>
        <div style="color:var(--fg2);overflow-wrap:anywhere">${x(formatLineageValue(v))}</div>
      </div>`).join('');

  // Upstream dependency chips
  const upstreamNodes = (_lineageExplorerGraph?.nodes || [])
    .filter(n => upstream.has(`${n.class}:${n.id}`) && `${n.class}:${n.id}` !== key);
  const upstreamHtml = upstreamNodes.length ? `
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--dim2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">
        Upstream dependencies (${upstreamNodes.length})
      </div>
      <div>${upstreamNodes.map(n => {
        const um = (LINEAGE_VOCAB[mode] || LINEAGE_VOCAB.universal)[n.class] || { icon: '◈', title: n.class };
        return `<span class="chip" style="margin:2px 4px 2px 0;display:inline-flex;align-items:center;gap:4px">${um.icon} ${x(um.title)}</span>`;
      }).join('')}</div>
    </div>` : '';

  panel.innerHTML = `
    <div class="lcard">
      <div style="font-size:28px;line-height:1;margin-bottom:10px">${meta.icon}</div>
      <div style="font-size:19px;font-weight:700;color:var(--fg);margin-bottom:3px">${x(meta.title)}</div>
      <div style="font-size:13px;color:var(--fg2);margin-bottom:18px">${x(meta.subtitle || '')}</div>
      ${kvRows}
      ${upstreamHtml}
    </div>`;
}

function _lineageUpstreamKeys(graph, nodeKey) {
  // Build forward adjacency from edges (from → to = downstream depends on upstream)
  const adj = new Map();
  for (const edge of graph?.edges || []) {
    const fk = `${edge.from.class}:${edge.from.id}`;
    const tk = `${edge.to.class}:${edge.to.id}`;
    if (!adj.has(fk)) adj.set(fk, []);
    adj.get(fk).push(tk);
  }
  // BFS: collect nodeKey + everything it points to
  const visited = new Set([nodeKey]);
  const queue = [nodeKey];
  while (queue.length) {
    const cur = queue.shift();
    for (const neighbor of (adj.get(cur) || [])) {
      if (!visited.has(neighbor)) {
        visited.add(neighbor);
        queue.push(neighbor);
      }
    }
  }
  return visited;
}

  document.getElementById('arc-tab-import').style.cssText   += tab === 'import'   ? activeStyle : inactiveStyle;

async function e10ImportBlueprint() {
  const title  = document.getElementById('arc-import-title')?.value?.trim();
  const thesis = document.getElementById('arc-import-thesis')?.value?.trim();
  const raw    = document.getElementById('arc-import-sections')?.value?.trim();
  const status = document.getElementById('arc-import-status');
  if (!title)  { status.textContent = 'Title required.';  status.style.color = 'var(--red)'; return; }
  if (!thesis) { status.textContent = 'Thesis required.'; status.style.color = 'var(--red)'; return; }
  if (!raw)    { status.textContent = 'At least one section required.'; status.style.color = 'var(--red)'; return; }

  // Parse sections: blocks separated by blank lines
  // First line of each block = claim, second line (if present) = OBS refs
  const blocks = raw.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  const sections = blocks.map(block => {
    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
    const claim = lines[0] || '';
    const obsLine = lines[1] || '';
    const obs_refs = obsLine.match(/OBS-\d+/gi) || [];
    return { claim, obs_refs };
  }).filter(s => s.claim);

  if (!sections.length) { status.textContent = 'No valid sections parsed.'; status.style.color = 'var(--red)'; return; }
  status.textContent = 'Importing…'; status.style.color = 'var(--dim2)';

  try {
    const res = await fetch('/api/architect/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, thesis, sections }),
    });
    const d = await res.json();
    if (!res.ok) { status.innerHTML = `<span style="color:var(--red)">${x(d.error || 'Error')}</span>`; return; }
    setActivePlan(d.plan_id, d.blueprint_id);
    status.innerHTML = `<span style="color:var(--green)">✓ Imported: "${x(d.title)}" — ${d.section_count} sections (set as active)</span>`;
    await e10LoadArchitect();
  } catch(e) {
    status.innerHTML = `<span style="color:var(--red)">${x(e.message)}</span>`;
  }
}

  if (!provider)  { status.textContent = 'Select a provider first.'; return; }
  btn.disabled = true;
  status.textContent = 'Generating blueprint… this may take 20–40 seconds.';
  try {
    const res = await fetch('/api/architect/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ directive, provider }),
    });
    const d = await res.json();
