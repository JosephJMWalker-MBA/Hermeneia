function renderArchitectList(data, panel) {
  const genForm = `
    <div style="border:1px solid var(--border);border-radius:var(--r);margin-bottom:24px;background:var(--bg2);overflow:hidden">
      <div style="display:flex;border-bottom:1px solid var(--border)">
        <button onclick="arcTab('generate')" id="arc-tab-generate"
          style="flex:1;padding:10px;background:var(--accent2);border:none;border-right:1px solid var(--border);color:var(--accent);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer">
          Generate from Directive
        </button>
        <button onclick="arcTab('import')" id="arc-tab-import"
          style="flex:1;padding:10px;background:none;border:none;color:var(--dim2);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer">
          Import Your Own
        </button>
      </div>

      <div id="arc-panel-generate" style="padding:20px">
        <div style="font-size:13px;color:var(--fg2);margin-bottom:12px">Enter your research question or essay directive. The Architect will synthesize a blueprint from the accepted interpretations in the corpus, evidence-first.</div>
        <textarea id="arc-directive" rows="3" placeholder="e.g. Analyze the metaphors in The Great Gatsby and how they shape meaning. 10-page essay with citations." style="width:100%;box-sizing:border-box;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:14px;font-family:var(--sans);resize:vertical;margin-bottom:10px"></textarea>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <select id="arc-gen-provider" style="padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:13px">
            <option value="">Loading providers…</option>
          </select>
          <button id="arc-gen-btn" class="btn-primary" onclick="e10GenerateBlueprint()" style="padding:7px 18px">Generate Blueprint →</button>
          <span id="arc-gen-status" style="font-size:13px;color:var(--dim2)"></span>
        </div>
      </div>

      <div id="arc-panel-import" style="padding:20px;display:none">
        <div style="font-size:13px;color:var(--fg2);margin-bottom:12px">Paste or write your own blueprint. Each section is one analytical claim. OBS-N references are optional — link specific observations or leave blank.</div>
        <input id="arc-import-title" type="text" placeholder="Blueprint title" style="width:100%;box-sizing:border-box;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:14px;margin-bottom:8px">
        <textarea id="arc-import-thesis" rows="2" placeholder="One-sentence thesis" style="width:100%;box-sizing:border-box;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:14px;font-family:var(--sans);resize:vertical;margin-bottom:12px"></textarea>
        <div style="font-size:11px;color:var(--dim2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase">Sections — one per line block, blank line between sections</div>
        <textarea id="arc-import-sections" rows="10"
          placeholder="Section 1 claim here&#10;OBS-6, OBS-19&#10;&#10;Section 2 claim here&#10;OBS-23, OBS-24&#10;&#10;Section 3 claim here&#10;(no observations needed)"
          style="width:100%;box-sizing:border-box;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--fg);font-size:13px;font-family:var(--mono);resize:vertical;margin-bottom:10px"></textarea>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn-primary" onclick="e10ImportBlueprint()" style="padding:7px 18px">Import Blueprint →</button>
          <span id="arc-import-status" style="font-size:13px;color:var(--dim2)"></span>
        </div>
      </div>
    </div>`;

  // Populate provider dropdown from configured providers
  get('/api/e10/providers').then(d => {
    const sel = document.getElementById('arc-gen-provider');
    if (!sel) return;
    const opts = (d.providers || []).map(p =>
      `<option value="${x(p.provider_id)}">${x(p.label)}${p.configured ? '' : ' (no key)'}</option>`
    );
    sel.innerHTML = opts.length ? opts.join('') : '<option value="">No providers configured</option>';
    // Pre-select first configured provider
    const first = (d.providers || []).find(p => p.configured);
    if (first) sel.value = first.provider_id;
  }).catch(() => {});

  if (!data.blueprints || data.blueprints.length === 0) {
    panel.innerHTML = genForm + '<div class="e10-empty" style="margin-top:0">No blueprints yet — generate one above.</div>';
    return;
  }
  const activePlanId = localStorage.getItem('hermeneia_active_plan_id') || '';
  const activeBpId  = localStorage.getItem('hermeneia_active_bp_id') || '';

  const rows = data.blueprints.map(bp => {
    const isActive = bp.architect_plan_id && bp.architect_plan_id === activePlanId;
    const activeBar = isActive
      ? `<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px;letter-spacing:.05em">▶ ACTIVE — Artist will use this blueprint</div>`
      : '';
    const activateBtn = bp.has_architect_plan && !isActive
      ? `<button onclick="event.stopPropagation();setActivePlan('${x(bp.architect_plan_id)}','${x(bp.id)}');renderArchitectList(_arcBlueprints, document.getElementById('architect-panel'))"
           style="font-size:11px;padding:3px 10px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--fg2);cursor:pointer;margin-top:6px">Set as active</button>`
      : '';
    return `
    <div class="lcard" style="cursor:pointer;${isActive ? 'border-color:var(--accent)' : ''}" onclick="e10LoadArchitectDetail('${x(bp.id)}')">
      ${activeBar}
      <div class="lhead" style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="bp-title" style="font-weight:600;color:var(--fg)">${x(bp.title)}</span>
        <span class="e10-meta" style="font-size:12px">
          ${bp.has_architect_plan
            ? '<span style="color:var(--green)">✓ Plan compiled</span>'
            : '<span style="color:var(--yellow)">⚠ No plan yet</span>'}
        </span>
      </div>
      <div class="bp-thesis" style="color:var(--fg2);font-size:14px;margin:6px 0 8px">${x(bp.thesis)}</div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--dim2)">
        <span>${bp.section_count} section${bp.section_count !== 1 ? 's' : ''}</span>
        <span>${bp.linked_obs_count} obs linked</span>
        <span>${bp.linked_interp_count} interp linked</span>
        <span class="mono">${x(bp.id.slice(0,12))}…</span>
      </div>
      ${activateBtn}
    </div>`;
  }).join('');

  panel.innerHTML = genForm + `
    <div style="margin-bottom:16px;color:var(--fg2);font-size:14px">
      ${data.count} blueprint${data.count !== 1 ? 's' : ''}
    </div>
    <div class="e10-stack">${rows}</div>
  `;
}

async function e10LoadArchitectDetail(blueprintId) {
  const panel = document.getElementById('architect-panel');
  panel.innerHTML = '<div class="e10-empty">Loading blueprint…</div>';
  try {
    const data = await get(`/api/architect/blueprints/${blueprintId}`);
    _arcDetail = data;
    renderArchitectDetail(data, panel);
  } catch(e) {
    panel.innerHTML = `<div class="e10-empty" style="color:var(--red)">Error: ${x(e.message)}</div>`;
  }
}

function renderArchitectDetail(d, panel) {
  const backBtn = `<button onclick="renderArchitectList(_arcBlueprints, document.getElementById('architect-panel'))"
    style="margin-bottom:24px;background:none;border:1px solid var(--border);color:var(--fg2);padding:4px 12px;border-radius:var(--r);cursor:pointer;font-size:13px">
    ← All Blueprints</button>`;

  // 1. Visual Pipeline Header — where we are in the frozen pipeline
  const pipelineSteps = ['Observation','Interpretation','Perspective','Blueprint','Architect'];
  const pipelineHtml = `
    <div style="display:flex;align-items:center;gap:0;margin-bottom:28px;flex-wrap:wrap;gap:2px">
      ${pipelineSteps.map((step, i) => {
        const active = step === 'Blueprint' || step === 'Architect';
        const arrow  = i < pipelineSteps.length - 1
          ? `<span style="color:var(--dim);padding:0 6px;font-size:12px">→</span>` : '';
        return `<span style="font-size:12px;font-family:var(--mono);padding:3px 10px;border-radius:var(--r);
          ${active
            ? 'background:var(--accent2);color:var(--accent);border:1px solid var(--accent);font-weight:600'
            : 'color:var(--dim2);border:1px solid transparent'}">${step}</span>${arrow}`;
      }).join('')}
    </div>`;

  // Blueprint header
  const header = `
    <div style="margin-bottom:24px">
      <div style="font-size:20px;font-weight:700;color:var(--fg);margin-bottom:8px">${x(d.title)}</div>
      <div style="color:var(--accent);font-size:15px;font-style:italic;margin-bottom:10px">${x(d.thesis)}</div>
      <div style="font-size:12px;color:var(--dim2)" class="mono">${x(d.id)}</div>
    </div>`;

  // Sections
  const sections = (d.sections || []).map((sec, i) => {
    const obsItems = sec.supporting_observations.map(oid => {
      const ob = sec.obs_texts?.[oid];
      const loc = ob ? `p.${ob.page ?? '?'} §${ob.paragraph ?? '?'}` : '';
      const txt = ob ? x(ob.text.slice(0, 200)) + (ob.text.length > 200 ? '…' : '') : `<span style="color:var(--dim)">${x(oid.slice(0,16))}… (not found)</span>`;
      return `<div style="font-size:13px;border-left:2px solid var(--border2);padding:4px 10px;margin:4px 0;color:var(--fg2)">
        ${loc ? `<span style="color:var(--dim2);font-size:11px" class="mono">${x(loc)}</span> ` : ''}${txt}
      </div>`;
    }).join('');

    const interpItems = sec.supporting_interpretations.map(iid => {
      const it = sec.interp_texts?.[iid];
      const txt = it ? x(it.text.slice(0, 180)) + (it.text.length > 180 ? '…' : '') : `<span style="color:var(--dim)">${x(iid.slice(0,16))}…</span>`;
      const badge = it?.evidential_status ? `<span class="chip" style="margin-right:4px">${x(it.evidential_status)}</span>` : '';
      return `<div style="font-size:13px;border-left:2px solid var(--blue);padding:4px 10px;margin:4px 0;color:var(--fg2)">
        ${badge}${txt}
      </div>`;
    }).join('');

    return `<div class="lcard" style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--dim2);margin-bottom:4px">Section ${i + 1}</div>
      <div style="font-weight:600;color:var(--fg);margin-bottom:10px">${x(sec.claim)}</div>
      ${sec.supporting_observations.length ? `
        <div style="font-size:12px;color:var(--dim2);margin-bottom:4px">Observations (${sec.supporting_observations.length})</div>
        ${obsItems}` : ''}
      ${sec.supporting_interpretations.length ? `
        <div style="font-size:12px;color:var(--dim2);margin:8px 0 4px">Interpretations (${sec.supporting_interpretations.length})</div>
        ${interpItems}` : ''}
    </div>`;
  }).join('');

  // Architect Plan
  let planHtml = '';
  if (!d.architect_plan) {
    planHtml = `<div class="e10-empty" style="margin-top:24px">No Architect Plan compiled yet for this blueprint.</div>`;
  } else {
    const ap = d.architect_plan;

    // 2. Contract Summary Card — aggregate counts across all paragraphs
    const totalTerms    = ap.paragraphs.reduce((n, p) => n + (p.required_terms?.length    || 0), 0);
    const totalForbid   = ap.paragraphs.reduce((n, p) => n + (p.forbidden_claims?.length  || 0), 0);
    const totalReqObs   = ap.paragraphs.reduce((n, p) => n + (p.required_observations?.length  || 0), 0);
    const totalReqInterp= ap.paragraphs.reduce((n, p) => n + (p.required_interpretations?.length || 0), 0);

    const contractSummary = `
      <div class="lcard" style="margin-bottom:20px;background:var(--surface2)">
        <div style="font-size:11px;color:var(--dim2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px">
          Architect Contract
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px">
          ${[
            ['Paragraphs',          ap.paragraph_count],
            ['Required Terms',      totalTerms],
            ['Forbidden Claims',    totalForbid],
            ['Req. Observations',   totalReqObs],
            ['Req. Interpretations',totalReqInterp],
          ].map(([label, val]) => `
            <div>
              <div style="font-size:22px;font-weight:700;color:var(--fg);font-family:var(--mono)">${val}</div>
              <div style="font-size:11px;color:var(--dim2)">${label}</div>
            </div>`).join('')}
        </div>
      </div>`;

    // 3. Semantic Contract Audit link
    const auditLink = `
      <div style="margin-bottom:20px">
        <button onclick="e10Go('lineage')"
          style="background:none;border:1px solid var(--border);color:var(--accent);
                 padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;
                 display:inline-flex;align-items:center;gap:6px">
          View Semantic Contract Audit →
        </button>
      </div>`;

    const paras = ap.paragraphs.map((p, i) => {
      const terms = p.required_terms?.length
        ? `<div style="margin-top:8px"><span style="font-size:11px;color:var(--dim2)">Required terms</span><br>${p.required_terms.map(t => { const term = typeof t === 'object' ? t.term : t; const pri = typeof t === 'object' ? t.priority : null; return `<span class="chip" style="${pri==='critical'?'border-color:var(--accent);color:var(--accent)':''}">${x(term)}</span>`; }).join(' ')}</div>`
        : '';
      const forbidden = p.forbidden_claims?.length
        ? `<div style="margin-top:8px"><span style="font-size:11px;color:var(--dim2)">Forbidden claims</span><br>${p.forbidden_claims.map(f => `<span class="chip" style="border-color:var(--red);color:var(--red)">${x(f)}</span>`).join(' ')}</div>`
        : '';
      const reqObs = p.required_observations?.length
        ? `<div style="margin-top:8px;font-size:12px;color:var(--dim2)">Requires ${p.required_observations.length} observation(s)</div>`
        : '';
      const reqInterp = p.required_interpretations?.length
        ? `<div style="margin-top:4px;font-size:12px;color:var(--dim2)">Requires ${p.required_interpretations.length} interpretation(s)</div>`
        : '';
      const notes = p.notes
        ? `<div style="margin-top:8px;font-size:13px;color:var(--fg2);font-style:italic">${x(p.notes)}</div>`
        : '';
      const section = p.blueprint_section != null
        ? `<span style="font-size:11px;color:var(--dim2)">§${p.blueprint_section + 1}</span> `
        : '';
      return `<div class="lcard" style="margin-bottom:10px">
        <div style="display:flex;gap:10px;align-items:baseline;margin-bottom:6px">
          <span style="font-size:11px;color:var(--dim2)">¶${i + 1}</span>
          ${section}
          <span style="font-size:12px;color:var(--accent)">${x(p.purpose || '—')}</span>
        </div>
        ${terms}${forbidden}${reqObs}${reqInterp}${notes}
      </div>`;
    }).join('');

    planHtml = `
      <div style="margin-top:28px;border-top:1px solid var(--border);padding-top:20px">
        <div style="font-size:13px;color:var(--dim2);margin-bottom:16px">
          Architect Plan
          <span class="mono" style="margin-left:8px">${x(ap.id.slice(0,12))}…</span>
        </div>
        ${contractSummary}
        ${auditLink}
        ${paras}
      </div>`;
  }

  panel.innerHTML = `
    ${backBtn}
    ${pipelineHtml}
    ${header}
    <div style="font-size:13px;color:var(--dim2);margin-bottom:14px">
      ${d.section_count} section${d.section_count !== 1 ? 's' : ''}
    </div>
    ${sections}
    ${planHtml}
  `;
}

function howExpand(id) {
  const el = document.getElementById(`guide-how-${id}`);
  if (!el) return;
  const open = el.dataset.open === 'true';
  el.dataset.open = open ? 'false' : 'true';
  el.querySelector('.guide-how-body').style.display = open ? 'none' : 'block';
  el.querySelector('.guide-how-toggle').textContent = open ? 'ⓘ Why this works' : '✕ Close';
}

      how: 'Each Observation is assigned a deterministic hash ID derived from its content and source coordinates. Deletion is not exposed through the interface or the API. The database schema enforces this structurally — there is no UPDATE or DELETE path for observations in the application layer.',
    },

      how: 'All Critic checks are implemented as deterministic functions in profile_fidelity.py and narrative_fidelity.py. They use string matching, regex, and word lists — no probabilistic models. The full check results, including evidence for each finding, are stored in the ValidationReport so every score can be inspected.',

      how: 'The pipeline is designed as a cycle, not a funnel. After a report is rendered and audited, the corpus is still accessible. New observations can be made. Existing interpretations can be contested. A new Blueprint can be built from the refined understanding. The ↺ symbol in the navigation is not decorative — it marks the intended motion of the system.',

Most systems hide these transformations. The output looks authoritative. The path that produced it is invisible.

Hermeneia is an attempt to make that path visible and permanent — to build infrastructure that keeps humans from losing the thread of truth as understanding evolves across time, audience, and medium.
