# ── Section Requirements ──────────────────────────────────────────────────────
# Each section declares what evidence tags it requires.
# Coverage report evaluates whether required tags are present and represented.

sections:

  - section: abstract
    required_tags: [thesis, governing-question, calibration]
    required_claims:
      - "AI collapses distinct cognitive responsibilities into one generative act"
      - "Separation makes inquiry more accountable"
      - "Calibration experiments produced observable findings"

  - section: "1-introduction"
    required_tags: [thesis, methodology]
    required_claims:
      - "Single prompt collapses discovery, interpretation, communication, evaluation"
      - "Hermeneia begins from a different premise"

  - section: "2-problem"
    required_tags: [methodology, thesis]
    required_claims:
      - "Failures in current AI are undiagnosable because responsibilities are collapsed"
      - "Separation is the mechanism; preservation of understanding is the goal"

  - section: "3-architecture"
    required_tags: [blueprint, methodology]
    required_claims:
      - "Five named cognitive responsibilities: Explorer, Architect, Artist, Critic, Steward"
      - "LLM occupies exactly one box (Artist)"
      - "Architect is deterministic — no inference"
      - "Constitutional governance preserves conditions for honest maturation"

  - section: "4-evidential-standards"
    required_tags: [methodology, provenance]
    required_claims:
      - "Demonstrated: implementation and automated tests"
      - "Empirical Finding: supported by one or more experiments"
      - "Research Hypothesis: candidate for investigation; not yet supported"

  - section: "5-calibration"
    required_tags: [calibration, replicated, observations, governing-question, figure]
    required_claims:
      - "RF-001: Observation stability across English, Spanish, Mandarin"
      - "RF-002: Classification stability across all three"
      - "RF-003: Governing question is primary culture-adaptive variable"
      - "RF-004: Evidence weighting is downstream from governing question"
      - "Divergence figure: same corpus → divergent governing questions"

  - section: "6-discussion"
    required_tags: [replicated, calibration, methodology]
    required_claims:
      - "Calibration, not validation — the distinction must be explicit"
      - "Semantic obligation failure localizes to Architect, not the model"

  - section: "7-limitations"
    required_tags: [hypothesis, calibration]
    required_claims:
      - "One corpus (Gatsby) cannot validate a universal methodology"
      - "Findings require domain-axis replication"

  - section: "8-future-work"
    required_tags: [research-program, hypothesis, future-work]
    required_claims:
      - "Explorer role: computational surface for candidate interpretations"
      - "Layer 4: Purpose — cross-domain recurrence"
      - "SCF benchmark as evaluation methodology"

  - section: "9-conclusion"
    required_tags: [governing-question, thesis]
    required_claims:
      - "Ends with the research program, not a sales pitch"
      - "Final question: what if we have been measuring outputs when we should measure evolution"

# ── Critic Configuration ──────────────────────────────────────────────────────

critics:
  - provider: anthropic
    role: blueprint-fidelity
    evaluates: required_claims, forbidden_claims
  - provider: openai
    role: evidence-coverage
    evaluates: required_tags, section_requirements
  - provider: grok
    role: instrument-framing
    evaluates: tone, research-register, advocacy-language

# ── Artist Configuration ──────────────────────────────────────────────────────

